<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Cyber Leap: Ultimate Overdrive</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            user-select: none;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: #010103;
            color: #fff;
            font-family: system-ui, -apple-system, sans-serif;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
            touch-action: none;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // ゲーム状態
        let gameState = 'START'; 
        let score = 0;
        let highScore = 0;
        let currentLevel = 0;
        let levelUpTimer = 0;

        // レイアウト設定
        let width, height, dpr, wallWidth, playerSize;
        
        // 画面演出用
        let shakeTime = 0, shakeIntensity = 0, flashTime = 0;
        let gridScrollY = 0;

        // 蛍光色パレット
        const PALETTES = [
            { neon1: '#00f3ff', neon2: '#ff007f', bg: '#020207', name: 'CYBER SHOCK' },
            { neon1: '#00ff66', neon2: '#bd00ff', bg: '#04010a', name: 'MATRIX ARCADE' },
            { neon1: '#ffff00', neon2: '#ff3300', bg: '#060101', name: 'ACID INFUSION' },
            { neon1: '#00ffff', neon2: '#ffff00', bg: '#010405', name: 'MAX OVERDRIVE' }
        ];
        let currentPalette = PALETTES[0];

        // プレイヤーと特殊状態
        const player = { 
            x: 0, y: 0, isLeft: true,
            hasShield: false,
            slowTimer: 0
        };

        // エンティティ配列
        let obstacles = [];
        let enemies = [];
        let items = [];
        let particles = [];
        let trails = [];
        let speedLines = [];
        let popups = [];

        let spawnTimer = 0;
        let entitySpawnTimer = 0;
        let baseGameSpeed = 6;
        let currentSpeed = 6;

        // オーディオシステム
        let audioCtx = null;
        let bgmInterval = null;
        let bgmStep = 0;
        const BGM_NOTES = [110, 130, 146, 165, 110, 130, 196, 165, 110, 146, 165, 220, 196, 165, 146, 130];

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                startBGM();
            }
            if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playSE(type) {
            if (!audioCtx) return;
            try {
                const now = audioCtx.currentTime;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);

                if (type === 'tap') {
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(400, now);
                    osc.frequency.exponentialRampToValueAtTime(1500, now + 0.06);
                    gain.gain.setValueAtTime(0.15, now);
                    gain.gain.linearRampToValueAtTime(0, now + 0.06);
                    osc.start(now); osc.stop(now + 0.06);
                } else if (type === 'nearmiss') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(900, now);
                    osc.frequency.exponentialRampToValueAtTime(1800, now + 0.1);
                    gain.gain.setValueAtTime(0.2, now);
                    gain.gain.linearRampToValueAtTime(0, now + 0.1);
                    osc.start(now); osc.stop(now + 0.1);
                } else if (type === 'item') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(523.25, now); // C5
                    osc.frequency.setValueAtTime(783.99, now + 0.08); // G5
                    osc.frequency.setValueAtTime(1046.50, now + 0.16); // C6
                    gain.gain.setValueAtTime(0.25, now);
                    gain.gain.linearRampToValueAtTime(0, now + 0.3);
                    osc.start(now); osc.stop(now + 0.3);
                } else if (type === 'shield_break') {
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(600, now);
                    osc.frequency.linearRampToValueAtTime(150, now + 0.2);
                    gain.gain.setValueAtTime(0.4, now);
                    gain.gain.linearRampToValueAtTime(0, now + 0.2);
                    osc.start(now); osc.stop(now + 0.2);
                } else if (type === 'level') {
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(150, now);
                    osc.frequency.exponentialRampToValueAtTime(900, now + 0.35);
                    gain.gain.setValueAtTime(0.25, now);
                    gain.gain.linearRampToValueAtTime(0, now + 0.35);
                    osc.start(now); osc.stop(now + 0.35);
                } else if (type === 'gameover') {
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(200, now);
                    osc.frequency.linearRampToValueAtTime(20, now + 0.7);
                    gain.gain.setValueAtTime(0.5, now);
                    gain.gain.linearRampToValueAtTime(0, now + 0.7);
                    osc.start(now); osc.stop(now + 0.7);
                }
            } catch (e) {}
        }

        function startBGM() {
            if (bgmInterval) clearInterval(bgmInterval);
            bgmInterval = setInterval(() => {
                if (gameState !== 'PLAYING' || !audioCtx) return;
                try {
                    const now = audioCtx.currentTime;
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.connect(gain); gain.connect(audioCtx.destination);

                    let note = BGM_NOTES[bgmStep % BGM_NOTES.length];
                    if (currentLevel > 0) note *= (1 + currentLevel * 0.1);
                    // スロー状態の時はピッチを半分（1オクターブ下）にする
                    if (player.slowTimer > 0) note *= 0.5;

                    osc.type = bgmStep % 4 === 0 ? 'square' : 'triangle';
                    osc.frequency.setValueAtTime(note, now);
                    
                    const vol = bgmStep % 4 === 2 ? 0.05 : 0.03;
                    gain.gain.setValueAtTime(vol, now);
                    gain.gain.linearRampToValueAtTime(0, now + 0.15);
                    
                    osc.start(now); osc.stop(now + 0.15);
                    bgmStep++;
                } catch (e) {}
            }, 140);
        }

        function resize() {
            dpr = window.devicePixelRatio || 1;
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width * dpr;
            canvas.height = height * dpr;
            ctx.scale(dpr, dpr);

            wallWidth = Math.min(25, Math.max(15, width * 0.05));
            playerSize = Math.min(30, Math.max(22, width * 0.075));
            player.y = height * 0.72;
            
            player.x = player.isLeft ? wallWidth : (width - wallWidth - playerSize);
        }

        function initSpeedLines() {
            speedLines = [];
            for (let i = 0; i < 25; i++) {
                speedLines.push({
                    x: Math.random() * (width - wallWidth * 2) + wallWidth,
                    y: Math.random() * height,
                    len: Math.random() * 60 + 40,
                    speed: Math.random() * 3 + 2,
                    w: Math.random() * 1.5 + 0.5
                });
            }
        }

        function createParticles(x, y, color, count, speed) {
            for (let i = 0; i < count; i++) {
                const angle = Math.random() * Math.PI * 2;
                const spd = Math.random() * speed + 1;
                particles.push({
                    x: x, y: y,
                    vx: Math.cos(angle) * spd,
                    vy: Math.sin(angle) * spd + 1,
                    size: Math.random() * 3.5 + 1.5,
                    alpha: 1,
                    decay: Math.random() * 0.025 + 0.015,
                    color: color
                });
            }
        }

        function triggerShake(intensity, duration) {
            shakeIntensity = intensity;
            shakeTime = duration;
        }

        function resetGame() {
            score = 0;
            baseGameSpeed = 6;
            currentSpeed = 6;
            currentLevel = 0;
            currentPalette = PALETTES[0];
            obstacles = [];
            enemies = [];
            items = [];
            particles = [];
            trails = [];
            popups = [];
            player.isLeft = true;
            player.hasShield = false;
            player.slowTimer = 0;
            player.x = player.isLeft ? wallWidth : (width - wallWidth - playerSize);
            spawnTimer = 0;
            entitySpawnTimer = 0;
        }

        function handleInput(e) {
            if (e) e.preventDefault();
            initAudio();

            if (gameState === 'PLAYING') {
                player.isLeft = !player.isLeft;
                playSE('tap');
                createParticles(player.x + playerSize / 2, player.y + playerSize / 2, currentPalette.neon1, 5, 4);
            } else {
                resetGame();
                gameState = 'PLAYING';
                playSE('level');
            }
        }

        window.addEventListener('pointerdown', handleInput, { passive: false });
        window.addEventListener('keydown', (e) => { if (e.code === 'Space') handleInput(e); });
        window.addEventListener('resize', resize);

        // コアロジックアップデート
        function update() {
            if (shakeTime > 0) shakeTime--;
            if (flashTime > 0) flashTime--;
            if (levelUpTimer > 0) levelUpTimer--;

            // スロー状態のタイマー処理と速度適用
            if (player.slowTimer > 0) {
                player.slowTimer--;
                currentSpeed = baseGameSpeed * 0.5;
            } else {
                currentSpeed = baseGameSpeed;
            }

            // 背景グリッドスクロール
            gridScrollY = (gridScrollY + currentSpeed * 0.5) % 45;

            // スピードライン
            speedLines.forEach(line => {
                line.y += line.speed * (gameState === 'PLAYING' ? currentSpeed * 0.5 : 0.8);
                if (line.y > height) {
                    line.y = -line.len;
                    line.x = Math.random() * (width - wallWidth * 2) + wallWidth;
                }
            });

            // パーティクル
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx; p.y += p.vy; p.alpha -= p.decay;
                if (p.alpha <= 0) particles.splice(i, 1);
            }

            // ポップアップテキスト
            for (let i = popups.length - 1; i >= 0; i--) {
                popups[i].y -= 1; popups[i].alpha -= 0.02;
                if (popups[i].alpha <= 0) popups.splice(i, 1);
            }

            // 【バグ修整】残像（トレイル）のライフサイクル管理
            for (let i = trails.length - 1; i >= 0; i--) {
                trails[i].alpha -= 0.05; // 毎フレーム透明度を下げる
                if (trails[i].alpha <= 0) {
                    trails.splice(i, 1); // 完全に透明になったら配列から削除
                }
            }

            if (gameState !== 'PLAYING') return;

            // スコアおよび動的難易度レベル上昇
            score++;
            const nextLevel = Math.min(3, Math.floor(score / 800));
            if (nextLevel > currentLevel) {
                currentLevel = nextLevel;
                currentPalette = PALETTES[currentLevel];
                baseGameSpeed += 1.5;
                levelUpTimer = 90;
                flashTime = 10;
                triggerShake(6, 12);
                playSE('level');
                createParticles(width / 2, height / 2, currentPalette.neon2, 30, 5);
            }

            // プレイヤー移動（イージング）
            const targetX = player.isLeft ? wallWidth : (width - wallWidth - playerSize);
            const dx = targetX - player.x;
            player.x += dx * 0.4;

            // 移動中のみ残像を生成
            if (Math.abs(dx) > 1) {
                trails.push({ x: player.x, y: player.y, alpha: 0.6 });
            }

            // 壁擦りエフェクト
            if (Math.abs(dx) < 1 && Math.random() < 0.3) {
                createParticles(player.isLeft ? wallWidth : width - wallWidth, player.y + playerSize / 2, currentPalette.neon2, 1, 2);
            }

            // スポーンタイマー進行
            spawnTimer++;
            entitySpawnTimer++;

            // 1. 固定・蛇行障害物の生成
            const obsInterval = Math.max(18, 45 - (currentLevel * 6));
            if (spawnTimer > obsInterval) {
                spawnTimer = 0;
                const rand = Math.random();
                const obsH = 24;
                const obsW = Math.random() * (width * 0.16) + (width * 0.12);
                let obsX = rand < 0.35 ? wallWidth : (rand < 0.7 ? width - wallWidth - obsW : (width / 2) - (obsW / 2));
                
                obstacles.push({
                    x: obsX, startX: obsX, y: -obsH, w: obsW, h: obsH,
                    isWave: currentLevel >= 1 && Math.random() > 0.5,
                    seed: Math.random() * 50, nearMissed: false
                });
            }

            // 2. 自律飛行型エネミー＆アイテムの複合生成
            if (entitySpawnTimer > 110) {
                entitySpawnTimer = 0;
                const rand = Math.random();
                
                if (rand < 0.35) {
                    // アイテム生成 (SHIELD, SLOW, SCORE)
                    const types = ['SHIELD', 'SLOW', 'SCORE'];
                    const colors = ['#00ff66', '#bd00ff', '#ffcc00'];
                    const idx = Math.floor(Math.random() * types.length);
                    items.push({
                        x: Math.random() * (width - wallWidth * 3) + wallWidth * 1.5,
                        y: -20, size: 18, type: types[idx], color: colors[idx], seed: Math.random() * 10
                    });
                } else {
                    // 敵キャラクターの生成
                    const isChaser = Math.random() > 0.5;
                    enemies.push({
                        x: Math.random() * (width - wallWidth * 3) + wallWidth * 1.5,
                        y: -25, size: 20,
                        type: isChaser ? 'CHASER' : 'DRONE',
                        vx: isChaser ? 0 : (Math.random() > 0.5 ? 2 : -2),
                        angle: 0
                    });
                }
            }

            // 障害物アップデート
            for (let i = obstacles.length - 1; i >= 0; i--) {
                const obs = obstacles[i];
                obs.y += currentSpeed;

                if (obs.isWave) {
                    obs.x = obs.startX + Math.sin((obs.y * 0.01) + obs.seed) * (width * 0.15);
                    if (obs.x < wallWidth) obs.x = wallWidth;
                    if (obs.x + obs.w > width - wallWidth) obs.x = width - wallWidth - obs.w;
                }

                // ニアミス判定
                if (!obs.nearMissed && Math.abs(obs.y - player.y) < playerSize) {
                    const dist = Math.abs((player.x + playerSize/2) - (obs.x + obs.w/2));
                    if (dist > (playerSize/2 + obs.w/2) && dist < (playerSize/2 + obs.w/2) + 20) {
                        obs.nearMissed = true;
                        score += 150;
                        playSE('nearmiss');
                        popups.push({ x: player.x + playerSize/2, y: player.y - 15, text: 'NEAR MISS! +150', alpha: 1 });
                    }
                }

                // 衝突チェック
                if (checkCollision(player.x, player.y, playerSize, playerSize, obs.x, obs.y, obs.w, obs.h)) {
                    handlePlayerHit();
                    obstacles.splice(i, 1);
                    continue;
                }
                if (obs.y > height) obstacles.splice(i, 1);
            }

            // 敵キャラクターアップデート
            for (let i = enemies.length - 1; i >= 0; i--) {
                const e = enemies[i];
                e.y += currentSpeed * 1.2;
                e.angle += 0.05;

                if (e.type === 'DRONE') {
                    // サイン波による横移動
                    e.x += e.vx;
                    if (e.x < wallWidth || e.x > width - wallWidth - e.size) e.vx *= -1;
                } else if (e.type === 'CHASER') {
                    // プレイヤーをじわじわ追尾
                    const pCenterX = player.x + playerSize / 2;
                    const eCenterX = e.x + e.size / 2;
                    if (pCenterX > eCenterX) e.x += 1.2;
                    else if (pCenterX < eCenterX) e.x -= 1.2;
                }

                if (checkCollision(player.x, player.y, playerSize, playerSize, e.x, e.y, e.size, e.size)) {
                    handlePlayerHit();
                    enemies.splice(i, 1);
                    continue;
                }
                if (e.y > height) enemies.splice(i, 1);
            }

            // アイテムアップデート
            for (let i = items.length - 1; i >= 0; i--) {
                const item = items[i];
                item.y += currentSpeed * 0.9;

                // 浮遊アニメーション
                item.x += Math.sin(item.y * 0.03 + item.seed) * 0.5;

                if (checkCollision(player.x, player.y, playerSize, playerSize, item.x, item.y, item.size, item.size)) {
                    playSE('item');
                    createParticles(item.x + item.size/2, item.y + item.size/2, item.color, 15, 4);
                    
                    if (item.type === 'SHIELD') {
                        player.hasShield = true;
                        popups.push({ x: item.x, y: item.y, text: 'SHIELD ACTIVE', alpha: 1 });
                    } else if (item.type === 'SLOW') {
                        player.slowTimer = 240; // 約4秒
                        popups.push({ x: item.x, y: item.y, text: 'TIME WARP SLOW', alpha: 1 });
                    } else if (item.type === 'SCORE') {
                        score += 1000;
                        popups.push({ x: item.x, y: item.y, text: 'CORE BURST +1000', alpha: 1 });
                    }
                    items.splice(i, 1);
                    continue;
                }
                if (item.y > height) items.splice(i, 1);
            }
        }

        // 汎用当たり判定
        function checkCollision(x1, y1, w1, h1, x2, y2, w2, h2) {
            return x1 < x2 + w2 && x1 + w1 > x2 && y1 < y2 + h2 && y1 + h1 > y2;
        }

        // 被弾処理（シールド対応）
        function handlePlayerHit() {
            if (player.hasShield) {
                player.hasShield = false;
                playSE('shield_break');
                triggerShake(8, 12);
                flashTime = 5;
                createParticles(player.x + playerSize/2, player.y + playerSize/2, '#00ff66', 20, 5);
                popups.push({ x: player.x + playerSize/2, y: player.y - 20, text: 'SHIELD BROKEN', alpha: 1 });
            } else {
                gameState = 'GAMEOVER';
                playSE('gameover');
                triggerShake(20, 30);
                flashTime = 10;
                createParticles(player.x + playerSize / 2, player.y + playerSize / 2, currentPalette.neon2, 40, 8);
                if (score > highScore) highScore = score;
            }
        }

        // 描画メイン
        function draw() {
            ctx.save();
            if (shakeTime > 0) {
                ctx.translate((Math.random() - 0.5) * shakeIntensity, (Math.random() - 0.5) * shakeIntensity);
            }

            // バックバッファクリア
            ctx.fillStyle = currentPalette.bg;
            ctx.fillRect(0, 0, width, height);

            // 🌟 演出：アクティブ・3Dサイバーグリッド背景（加算合成）
            ctx.save();
            ctx.globalCompositeOperation = 'lighter';
            ctx.strokeStyle = currentPalette.neon1;
            ctx.lineWidth = 1;
            
            // 縦グリッド（遠近感を出す放射状風）
            const gridCount = 8;
            for (let i = 0; i <= gridCount; i++) {
                const xRatio = i / gridCount;
                ctx.globalAlpha = 0.03 + (1 - Math.abs(xRatio - 0.5) * 2) * 0.05;
                ctx.beginPath();
                ctx.moveTo(width * xRatio, 0);
                ctx.lineTo(width * 0.5 + (width * (xRatio - 0.5) * 1.5), height);
                ctx.stroke();
            }
            // 横グリッド（スクロール）
            ctx.globalAlpha = 0.05;
            for (let y = gridScrollY; y < height; y += 45) {
                ctx.beginPath();
                ctx.moveTo(wallWidth, y); ctx.lineTo(width - wallWidth, y);
                ctx.stroke();
            }
            ctx.restore();

            // 集中線演出
            ctx.save();
            ctx.globalCompositeOperation = 'lighter';
            ctx.fillStyle = currentPalette.neon1;
            ctx.globalAlpha = player.slowTimer > 0 ? 0.1 : 0.25; // スロー時は光線を薄く
            speedLines.forEach(line => {
                ctx.fillRect(line.x, line.y, line.w, line.len);
            });
            ctx.restore();

            // 左右のネオンレーザーウォール
            ctx.strokeStyle = currentPalette.neon1;
            ctx.lineWidth = 4;
            ctx.shadowBlur = 15; ctx.shadowColor = currentPalette.neon1;
            ctx.beginPath();
            ctx.moveTo(wallWidth, 0); ctx.lineTo(wallWidth, height);
            ctx.moveTo(width - wallWidth, 0); ctx.lineTo(width - wallWidth, height);
            ctx.stroke();

            // 固定・蛇行トラップ障害物の描画
            obstacles.forEach(obs => {
                ctx.fillStyle = currentPalette.neon1;
                ctx.shadowColor = currentPalette.neon1; ctx.shadowBlur = 10;
                ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
                ctx.fillStyle = '#fff'; ctx.shadowBlur = 0;
                ctx.fillRect(obs.x + 2, obs.y + 2, obs.w - 4, obs.h - 4);
            });

            // 🛸 敵キャラクター（エネミー）の描画
            enemies.forEach(e => {
                ctx.save();
                ctx.translate(e.x + e.size/2, e.y + e.size/2);
                ctx.rotate(e.angle);
                ctx.shadowColor = '#ff3300'; ctx.shadowBlur = 12;
                
                if (e.type === 'DRONE') {
                    // 回転するひし形（コア）
                    ctx.fillStyle = '#ff3300';
                    ctx.beginPath();
                    ctx.moveTo(0, -e.size/2); ctx.lineTo(e.size/2, 0);
                    ctx.lineTo(0, e.size/2); ctx.lineTo(-e.size/2, 0);
                    ctx.closePath(); ctx.fill();
                } else {
                    // 追尾型：禍々しい逆三角形
                    ctx.fillStyle = '#ff0055';
                    ctx.beginPath();
                    ctx.moveTo(0, -e.size/2); ctx.lineTo(e.size/2, e.size/2);
                    ctx.lineTo(-e.size/2, e.size/2);
                    ctx.closePath(); ctx.fill();
                }
                ctx.fillStyle = '#fff'; ctx.shadowBlur = 0;
                ctx.fillRect(-3, -3, 6, 6); // 中心点発光
                ctx.restore();
            });

            // 💎 能力アイテムの描画
            items.forEach(item => {
                ctx.save();
                ctx.shadowColor = item.color; ctx.shadowBlur = 15;
                ctx.fillStyle = item.color;
                
                // 正八面体（クリスタル状）の描画
                ctx.beginPath();
                ctx.moveTo(item.x + item.size/2, item.y);
                ctx.lineTo(item.x + item.size, item.y + item.size/2);
                ctx.lineTo(item.x + item.size/2, item.y + item.size);
                ctx.lineTo(item.x, item.y + item.size/2);
                ctx.closePath(); ctx.fill();
                
                // アイテム種別の頭文字を内包
                ctx.fillStyle = '#000'; ctx.shadowBlur = 0;
                ctx.font = 'bold 11px sans-serif'; ctx.textAlign = 'center';
                ctx.fillText(item.type[0], item.x + item.size/2, item.y + item.size/2 + 4);
                ctx.restore();
            });

            // 【修整確認済】プレイヤートレイル（残像）のフェード描画
            trails.forEach(t => {
                ctx.save();
                ctx.fillStyle = currentPalette.neon2;
                ctx.globalAlpha = t.alpha * 0.35; // アルファ値を連動
                ctx.fillRect(t.x, t.y, playerSize, playerSize);
                ctx.restore();
            });

            // プレイヤーコアの描画
            ctx.fillStyle = currentPalette.neon2;
            ctx.shadowColor = currentPalette.neon2; ctx.shadowBlur = 18;
            ctx.fillRect(player.x, player.y, playerSize, playerSize);
            ctx.fillStyle = '#fff'; ctx.shadowBlur = 0;
            ctx.fillRect(player.x + 4, player.y + 4, playerSize - 8, playerSize - 8);

            // 🟢 特殊：シールド展開時のエフェクト
            if (player.hasShield) {
                ctx.save();
                ctx.strokeStyle = '#00ff66'; ctx.lineWidth = 3;
                ctx.shadowColor = '#00ff66'; ctx.shadowBlur = 15;
                ctx.beginPath();
                ctx.arc(player.x + playerSize/2, player.y + playerSize/2, playerSize * 0.9, 0, Math.PI * 2);
                ctx.stroke();
                ctx.restore();
            }

            // 🟣 特殊：タイムスロー発動中の画面外周エフェクト
            if (player.slowTimer > 0) {
                ctx.strokeStyle = 'rgba(189, 0, 255, ' + (Math.sin(player.slowTimer * 0.1) * 0.2 + 0.3) + ')';
                ctx.lineWidth = 8;
                ctx.strokeRect(0, 0, width, height);
            }

            // 飛び散るパーティクル（加算合成）
            ctx.save();
            ctx.globalCompositeOperation = 'lighter';
            particles.forEach(p => {
                ctx.fillStyle = p.color; ctx.globalAlpha = p.alpha;
                ctx.fillRect(p.x, p.y, p.size, p.size);
            });
            ctx.restore();

            // テキストポップアップ
            popups.forEach(pop => {
                ctx.fillStyle = `rgba(255, 255, 255, ${pop.alpha})`;
                ctx.font = 'bold 12px sans-serif'; ctx.textAlign = 'center';
                ctx.fillText(pop.text, pop.x, pop.y);
            });

            // ヘッドアップディスプレイ (UI)
            ctx.fillStyle = '#fff';
            ctx.font = '900 13px sans-serif'; ctx.textAlign = 'left';
            ctx.fillText(`SCORE: ${score}`, wallWidth + 15, 38);
            ctx.textAlign = 'right';
            ctx.fillText(`TOP: ${highScore}`, width - wallWidth - 15, 38);

            ctx.textAlign = 'center';
            ctx.font = '800 10px sans-serif'; ctx.fillStyle = currentPalette.neon1;
            ctx.fillText(`${currentPalette.name} (LV.${currentLevel})`, width / 2, 38);

            // レベルアップ警告アナウンス
            if (levelUpTimer > 0) {
                ctx.save();
                ctx.globalAlpha = Math.sin(levelUpTimer * 0.15) * 0.5 + 0.5;
                ctx.fillStyle = '#fff'; ctx.font = '900 30px sans-serif'; ctx.textAlign = 'center';
                ctx.fillText('SPEED OVERDRIVE', width / 2, height * 0.4);
                ctx.font = 'bold 14px sans-serif'; ctx.fillStyle = currentPalette.neon2;
                ctx.fillText(`LEVEL ${currentLevel} - QUANTUM SHIFT`, width / 2, height * 0.4 + 25);
                ctx.restore();
            }

            // スタート／ゲームオーバー画面
            if (gameState === 'START') {
                drawScreenOverlay('rgba(2, 2, 5, 0.85)', 'CYBER LEAP', currentPalette.neon2, 'ULTIMATE', 'TAP TO START');
            } else if (gameState === 'GAMEOVER') {
                drawScreenOverlay('rgba(15, 0, 4, 0.9)', 'CORE CRASH', '#ff1133', `FINAL SCORE: ${score}`, 'TAP TO REBOOT');
            }

            ctx.restore();

            // フラッシュエフェクト
            if (flashTime > 0) {
                ctx.fillStyle = `rgba(255, 255, 255, ${flashTime * 0.08})`;
                ctx.fillRect(0, 0, width, height);
            }
        }

        function drawScreenOverlay(bg, t1, c1, t2, sub) {
            ctx.fillStyle = bg; ctx.fillRect(0, 0, width, height);
            ctx.textAlign = 'center';
            ctx.fillStyle = c1; ctx.font = `900 ${Math.min(width * 0.11, 44)}px sans-serif`;
            ctx.shadowColor = c1; ctx.shadowBlur = 20;
            ctx.fillText(t1, width / 2, height / 2 - 35);
            ctx.fillStyle = '#fff'; ctx.font = 'italic 800 20px sans-serif';
            ctx.shadowColor = '#fff'; ctx.shadowBlur = 10;
            ctx.fillText(t2, width / 2, height / 2 + 5);
            ctx.fillStyle = currentPalette.neon1; ctx.font = '700 13px sans-serif'; ctx.shadowBlur = 0;
            ctx.fillText(sub, width / 2, height / 2 + 65);
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // 初期セットアップ
        resize();
        initSpeedLines();
        gameLoop();
    </script>
</body>
</html>
