  battleState.playerMaxMp = 100;
  battleState.playerMp = 30;            // 序盤の選択肢を確保するため少しだけ持って開始
  battleState.enemyMaxMp = 100;
  battleState.enemyMp = 0;
  battleState.playerGuarding = false;
  battleState.enemyGuarding = false;
  battleState.playerBuff = 0;
  battleState.enemyBuff = 0;
  battleState.playerActionHistory = [];
  battleState.turn = 0;
  battleState.ended = false;
  battleState.byJudge = false;
  battleState.log = ['バトル開始!'];
  game.state = 'boss';
  render();
}

/* =========================================
   ダメージ計算ヘルパー
   ========================================= */

// 命中判定: 攻撃側spd - 防御側spd の差で命中率が決まる(±最大15%)
function checkHit(atkSpd, defSpd, r, atkLuk = 0, defLuk = 0) {
  const spdDiff = atkSpd - defSpd;
  // 基本命中率92%、spd差で±15%変動
  let hitRate = 0.92 + Math.max(-0.15, Math.min(0.15, spdDiff * 0.004));
  // 運差による命中補正(累進性):
  //   |luk差| ≤ 60 → 係数 0.0035 (緩やか)
  //   |luk差| > 60 → 超過分は係数 0.006 (急上昇)
  // 最大: 運差130 → 60*0.0035 + 70*0.006 = 0.21 + 0.42 = -63%(防御有利時)
  // 上下限を大きく緩和して運特化に大きな恩恵を
  const lukDiff = atkLuk - defLuk;
  const absLuk = Math.abs(lukDiff);
  const baseDiff = Math.min(60, absLuk) * 0.0035;
  const excessDiff = Math.max(0, absLuk - 60) * 0.006;
  const lukAdj = (baseDiff + excessDiff) * Math.sign(lukDiff);
  // 攻撃側有利は最大+15%、防御側有利は最大-65%(つまり命中27%≒回避73%)
  hitRate += Math.max(-0.65, Math.min(0.15, lukAdj));
  // 絶対下限25%、上限98%(運差超巨大なら回避75%まで成立)
  hitRate = Math.max(0.25, Math.min(0.98, hitRate));
  return r() < hitRate;
}

// 会心判定: 攻撃側luk依存、防御側lukで軽減
// 運差による累進的恩恵: luk差60までは緩やか、それを超えると急上昇
function checkCrit(atkLuk, defLuk, r) {
  const lukDiff = atkLuk - defLuk;
  // ベース: 基本4% + 攻撃luk*0.0035 - 防御luk*0.002
  let critRate = 0.04 + atkLuk * 0.0035 - defLuk * 0.002;
  // 運差ボーナス: 60超過分に追加で確率上乗せ(攻撃側有利時のみ)
  if (lukDiff > 60) {
    critRate += (lukDiff - 60) * 0.004;
  }
  // 上限70%(運差大なら極めて高い会心率)
  critRate = Math.max(0.01, Math.min(0.70, critRate));
  return r() < critRate;
}

// 通常攻撃のダメージ計算
// 式: atk * 1.5 - def * 0.7 (atkの方がdefより重みあり、わずかな差で壊れない)
function calcNormalDamage(atk, def, r, crit, guarding) {
  const base = atk * 1.5 - def * 0.7;
  let dmg = Math.floor(base * (0.88 + r() * 0.24));
  if (crit) dmg = Math.floor(dmg * 2);
  if (guarding) dmg = Math.floor(dmg * 0.25);  // ガード中は75%軽減
  return Math.max(1, dmg);
}

// 必殺技のダメージ計算
// 式: atk * 1.0 + int * 1.8 - def * 0.4 (intのスケーリングが高い)
function calcSpecialDamage(atk, int_, def, r, guarding) {
  const base = atk * 1.0 + int_ * 1.8 - def * 0.4;
  let dmg = Math.floor(base * (0.92 + r() * 0.16));
  if (guarding) dmg = Math.floor(dmg * 0.4);   // 必殺技にもガードは効くが半減程度
  return Math.max(1, dmg);
}

// 回復量計算: int*2.5 のみ(完全に賢さ依存。低intキャラは回復価値が薄い)
// 例: int20→50、int50→125、int100→250、int130→325
function calcHeal(int_, maxHp, r) {
  return Math.floor((int_ * 2.5) * (0.95 + r() * 0.10));
}

/* =========================================
   ボス戦アクション
   ========================================= */

function battleAction(action) {
  if (battleState.ended) return;

  const me = { ...game.stats, hp: battleState.playerHp, maxHp: battleState.playerMaxHp };
  const enemy = battleState.enemy;
  const r = Math.random;

  // 必殺技のMPチェック
  if (action === 'special' && battleState.playerMp < SPECIAL_MP_COST) {
    showToast(`MPが足りません(${battleState.playerMp}/${SPECIAL_MP_COST})`);
    return;
  }
  // かいふくのMPチェック
  if (action === 'heal' && battleState.playerMp < HEAL_MP_COST) {
    showToast(`MPが足りません(${battleState.playerMp}/${HEAL_MP_COST})`);
    return;
  }

  battleState.turn++;
  battleState.log.push(`━━ ターン${battleState.turn} ━━`);

  // 先制判定: spd差 + 乱数
  const playerInit = me.spd + Math.floor(r() * 10);
  const enemyInit = enemy.spd + Math.floor(r() * 10);
  const playerFirst = playerInit >= enemyInit;

  // 今ターンのガード状態を更新(古いガード状態はターン開始時に解除)
  battleState.playerGuarding = (action === 'guard');
  battleState.enemyGuarding = false; // 敵のガードもターン開始時にリセット(以降のenemyTurn内でtrueになる場合あり)

  // プレイヤー行動を履歴に追加(直近5ターン保持)
  battleState.playerActionHistory.push(action);
  if (battleState.playerActionHistory.length > 5) {
    battleState.playerActionHistory.shift();
  }

  function playerTurn() {
    if (action === 'attack') {
      const hit = checkHit(me.spd, enemy.spd, r, me.luk, enemy.luk);
      if (!hit) {
        showDamage('player-target', 'MISS', 'miss');
        battleState.log.push(`${game.character.name}の攻撃は外れた!`);
        battleState.playerMp = Math.min(battleState.playerMaxMp, battleState.playerMp + MP_CHARGE.miss);
        return;
      }
      const crit = checkCrit(me.luk, enemy.luk, r);
      let dmg = calcNormalDamage(me.atk, enemy.def, r, crit, battleState.enemyGuarding);
      // 反撃バフ: 直前ターンにぼうぎょ成功していたら +30%
      if (battleState.playerBuff > 0) {
        dmg = Math.floor(dmg * 1.30);
      }
      battleState.enemyHp = Math.max(0, battleState.enemyHp - dmg);
      battleState.playerMp = Math.min(battleState.playerMaxMp, battleState.playerMp + MP_CHARGE.attack);
      animateAttack('player');
      showDamage('enemy-target', crit ? `${dmg}!` : dmg, crit ? 'crit' : '');
      battleState.log.push(`${crit ? '会心の一撃! ' : ''}${battleState.playerBuff > 0 ? '反撃! ' : ''}${enemy.name}に${dmg}ダメージ!`);
    } else if (action === 'special') {
      battleState.playerMp -= SPECIAL_MP_COST;
      const dmg = calcSpecialDamage(me.atk, me.int, enemy.def, r, battleState.enemyGuarding);
      battleState.enemyHp = Math.max(0, battleState.enemyHp - dmg);
      animateAttack('player');
      showDamage('enemy-target', `${dmg}!`, 'crit');
      battleState.log.push(`必殺技炸裂! ${enemy.name}に${dmg}ダメージ!`);
    } else if (action === 'guard') {
      battleState.playerMp = Math.min(battleState.playerMaxMp, battleState.playerMp + MP_CHARGE.guard);
      // 反撃バフを次ターン用に予約
      battleState.playerBuff = 2;  // この後ターン終了時に1減るので、次ターンで1残る
      battleState.log.push(`${game.character.name}は身を固めた! (MP+${MP_CHARGE.guard} / 次ターン反撃強化)`);
    } else if (action === 'heal') {
      battleState.playerMp = Math.max(0, battleState.playerMp - HEAL_MP_COST);
      const heal = calcHeal(me.int, battleState.playerMaxHp, r);
      const before = battleState.playerHp;
      battleState.playerHp = Math.min(battleState.playerMaxHp, battleState.playerHp + heal);
      const actualHeal = battleState.playerHp - before;
      showDamage('player-target', `+${actualHeal}`, 'heal');
      battleState.log.push(`体力を${actualHeal}回復した! (MP-${HEAL_MP_COST})`);
    }
  }

  function enemyTurn() {
    if (battleState.enemyHp <= 0) return;

    // ====== 敵AI(プレイヤー履歴を読む) ======
    const enemyHpRatio = battleState.enemyHp / battleState.enemyMaxHp;
    const playerHpRatio = battleState.playerHp / battleState.playerMaxHp;
    const hist = battleState.playerActionHistory;
    const recent = hist.slice(-4); // 直近4ターン
    // 連発検知
    const attackStreak = (() => {
      let n = 0;
      for (let i = hist.length - 1; i >= 0; i--) {
        if (hist[i] === 'attack') n++; else break;
      }
      return n;
    })();
    const lastAction = hist[hist.length - 1];
    const recentHealCount = recent.filter(a => a === 'heal').length;
    const recentGuardCount = recent.filter(a => a === 'guard').length;
    const enemyHasSkillMp = battleState.enemyMp >= 60;

    // 回復が意味あるか判定: int*2.5 が maxHp の 15% を超えるか
    // (低intボスは回復しても効率が悪いので諦める。バサカ・コロッ等は回復しない)
    const healWorthwhile = enemy.int * 2.5 > battleState.enemyMaxHp * 0.15;

    // ====== 行動決定の優先順位 ======
    let useSkill = false;
    let willGuard = false;
    let willHeal = false;

    // [1] 回復判定: HP45%以下で確率発動、20%以下で最優先(MPが30以上必要)
    const enemyHasHealMp = battleState.enemyMp >= HEAL_MP_COST;
    if (healWorthwhile && enemyHasHealMp) {
      if (enemyHpRatio < 0.20 && r() < 0.60) willHeal = true;
      else if (enemyHpRatio < 0.35 && r() < 0.32) willHeal = true;
      else if (enemyHpRatio < 0.45 && r() < 0.13) willHeal = true;
    }

    // [2] 必殺技確率(回復を選んでない場合)
    if (!willHeal) {
      let skillChance = enemyHpRatio < 0.4 ? 0.55 : 0.32;
      // プレイヤーがガード/回復に偏っている→押し切るチャンス、必殺優先
      if (recentHealCount >= 2 || recentGuardCount >= 2) skillChance += 0.25;
      // 高intボスは必殺で活きるので+10%
      if (enemy.int >= 70) skillChance += 0.10;
      useSkill = r() < skillChance;
    }

    // [3] 読みガード: プレイヤーがこうげき3連発以上 → 確率でガード(連発回数で上昇)
    if (!willHeal && attackStreak >= 3 && r() < Math.min(0.55, 0.20 + attackStreak * 0.10)) {
      willGuard = true;
      useSkill = false;
    }
    // [3.5] ベースガード: プレイヤーの行動に関係なく一定確率でガードを混ぜる(読みを的中させない)
    //       初手でも発動する。フェイントとしての役割。
    if (!willHeal && !willGuard && r() < 0.12) {
      willGuard = true;
      useSkill = false;
    }
    // [4] プレイヤーがぼうぎょ直後(反撃バフ中)→必殺を撃つと反撃で被弾するので避ける
    if (lastAction === 'guard' && useSkill && r() < 0.6) {
      useSkill = false; // 通常攻撃に切り替え
    }
    // [5] HP半分以下&攻撃連発されてる→ガードで凌ぐ
    if (!willHeal && !willGuard && enemyHpRatio < 0.50 && attackStreak >= 1 && r() < 0.25) {
      willGuard = true;
      useSkill = false;
    }
    // [6] HP瀕死&敵MP不足ならガードでMP溜める
    if (!willHeal && enemyHpRatio < 0.30 && !enemyHasSkillMp && r() < 0.40) {
      willGuard = true;
      useSkill = false;
    }

    // === 回復(heal)処理 ===
    if (willHeal) {
      battleState.enemyMp = Math.max(0, battleState.enemyMp - HEAL_MP_COST);
      const healAmount = Math.floor((enemy.int * 2.5) * (0.95 + r() * 0.10));
      const before = battleState.enemyHp;
      battleState.enemyHp = Math.min(battleState.enemyMaxHp, battleState.enemyHp + healAmount);
      const actualHeal = battleState.enemyHp - before;
      showDamage('enemy-target', `+${actualHeal}`, 'heal');
      battleState.log.push(`${enemy.name}は体力を${actualHeal}回復した!`);
      return;
    }

    // === ガード(読みガード)処理 ===
    if (willGuard) {
      battleState.enemyGuarding = true;
      // 敵にも反撃バフ(次ターン火力+30%)
      battleState.enemyBuff = 2;
      battleState.enemyMp = Math.min(battleState.enemyMaxMp, battleState.enemyMp + 25);
      battleState.log.push(`${enemy.name}は身構えた…!`);
      return;
    }

    if (useSkill) {
      // 必殺技扱い
      const skillMul = enemy.skillPower;
      const hit = checkHit(enemy.spd, me.spd, r, enemy.luk, me.luk);
      if (!hit) {
        showDamage('player-target', 'MISS', 'miss');
        battleState.log.push(`${enemy.name}の${enemy.skill}は外れた!`);
        return;
      }
      const base = enemy.atk * 1.4 - me.def * 0.4;
      let dmg = Math.floor(base * skillMul * (0.92 + r() * 0.16));
      if (battleState.enemyBuff > 0) dmg = Math.floor(dmg * 1.30);
      if (battleState.playerGuarding) dmg = Math.floor(dmg * 0.45);
      dmg = Math.max(1, dmg);
      battleState.playerHp = Math.max(0, battleState.playerHp - dmg);
      animateAttack('enemy');
      showDamage('player-target', `${dmg}!`, 'crit');
      battleState.log.push(`${enemy.name}の${enemy.skill}! ${battleState.enemyBuff > 0 ? '反撃! ' : ''}${battleState.playerGuarding ? '一部防いだが ' : ''}${dmg}ダメージを受けた!`);
    } else {
      // 通常攻撃
      const hit = checkHit(enemy.spd, me.spd, r, enemy.luk, me.luk);
      if (!hit) {
        showDamage('player-target', 'MISS', 'miss');
        battleState.log.push(`${enemy.name}の攻撃は外れた!`);
        return;
      }
      const crit = checkCrit(enemy.luk, me.luk, r);
      let dmg = calcNormalDamage(enemy.atk, me.def, r, crit, battleState.playerGuarding);
      if (battleState.enemyBuff > 0) dmg = Math.floor(dmg * 1.30);
      battleState.playerHp = Math.max(0, battleState.playerHp - dmg);
      animateAttack('enemy');
      showDamage('player-target', crit ? `${dmg}!` : dmg, crit ? 'crit' : '');
      battleState.log.push(`${crit ? '会心! ' : ''}${battleState.enemyBuff > 0 ? '反撃! ' : ''}${enemy.name}の攻撃! ${battleState.playerGuarding ? '防御で軽減し ' : ''}${dmg}ダメージを受けた!`);
    }
  }

  if (playerFirst) {
    playerTurn();
    setTimeout(() => {
      if (battleState.enemyHp <= 0) { endBattle(true); render(); return; }
      enemyTurn();
      // ターン終了処理: 反撃バフのカウントダウン
      if (battleState.playerBuff > 0) battleState.playerBuff--;
      if (battleState.enemyBuff > 0) battleState.enemyBuff--;
      if (battleState.playerHp <= 0) { endBattle(false); render(); return; }
      // 30ターン経過でジャッジ判定: HP割合が高い側の勝利(同率はプレイヤー敗北)
      if (battleState.turn >= 30) {
        const playerRatio = battleState.playerHp / battleState.playerMaxHp;
        const enemyRatio = battleState.enemyHp / battleState.enemyMaxHp;
        battleState.log.push(`━━ 30ターン経過! ジャッジ判定! ━━`);
        battleState.log.push(`体力割合 ${game.character.name}:${Math.floor(playerRatio*100)}% / ${battleState.enemy.name}:${Math.floor(enemyRatio*100)}%`);
        endBattle(playerRatio > enemyRatio, true);
      }
      render();
    }, 600);
  } else {
    enemyTurn();
    setTimeout(() => {
      if (battleState.playerHp <= 0) { endBattle(false); render(); return; }
      playerTurn();
      if (battleState.playerBuff > 0) battleState.playerBuff--;
      if (battleState.enemyBuff > 0) battleState.enemyBuff--;
      if (battleState.enemyHp <= 0) { endBattle(true); render(); return; }
      // 30ターン経過でジャッジ判定
      if (battleState.turn >= 30) {
        const playerRatio = battleState.playerHp / battleState.playerMaxHp;
        const enemyRatio = battleState.enemyHp / battleState.enemyMaxHp;
        battleState.log.push(`━━ 30ターン経過! ジャッジ判定! ━━`);
        battleState.log.push(`体力割合 ${game.character.name}:${Math.floor(playerRatio*100)}% / ${battleState.enemy.name}:${Math.floor(enemyRatio*100)}%`);
        endBattle(playerRatio > enemyRatio, true);
      }
      render();
    }, 600);
  }

  render();
}

function endBattle(victory, byJudge = false) {
  battleState.ended = true;
  battleState.byJudge = byJudge;
  battleState.log.push(victory ? (byJudge ? '⏱️ ジャッジ勝利!' : '🎉 勝利!') : (byJudge ? '⏱️ ジャッジ敗北...' : '💔 敗北...'));
  setTimeout(() => {
    game.state = victory ? 'win' : 'lose';
    render();
  }, byJudge ? 2500 : 1200);  // ジャッジ時は結果がわかるまで時間を長めに
}

// ログエントリの分類: 内容文字列からタイプを推測してCSSクラス用suffixを返す
function classifyLogEntry(text) {
  if (!text) return '';
  if (/^={3,}|^---|^▼|ターン[\s0-9]/.test(text)) return 'log-turn';
  if (/勝利|敗北|倒した|やられた/.test(text)) return 'log-result';
  if (/回復した|体力を.*回復/.test(text)) return 'log-heal';
  if (/身構え|防御で|身を固め|ガード/.test(text)) return 'log-guard';
  if (/必殺|メテオ|咆哮|刃|呪詛|猛襲|揺らし|舞踏|崩撃|炸裂|ひっさつ/.test(text)) return 'log-special';
  if (/ダメージ|攻撃|外れた|会心|MISS/.test(text)) return 'log-attack';
  return '';
}

// 戦闘ログをHTML化(エントリ毎にspan化、最近のN件取得)
function renderBattleLogEntries(logs, limit = 6) {
  if (!logs || logs.length === 0) return '<div class="small" style="color:var(--c-sub);text-align:center;padding:8px;">バトル開始!</div>';
  const recent = logs.slice(-limit);
  return recent.map(l => `<div class="battle-log-entry ${classifyLogEntry(l)}">${l}</div>`).join('');
}

// 全ログモーダル表示
function showFullBattleLog(source) {
  // source: 'boss' | 'pvp'
  const logs = source === 'pvp' ? pvpState.log : battleState.log;
  const turn = source === 'pvp' ? pvpState.turn : battleState.turn;
  const html = logs.length === 0
    ? '<div class="small">ログがまだないよ</div>'
    : logs.map((l, i) => `<div class="battle-log-entry ${classifyLogEntry(l)}">${i+1}. ${l}</div>`).join('');
  openModal(`
    <div class="modal-title">📜 戦闘ログ (${logs.length}件 / ${turn}ターン)</div>
    <div style="max-height:60vh;overflow-y:auto;background:#fafaf6;padding:8px;border-radius:8px;border:1px solid var(--c-text);">
      ${html}
    </div>
    <button class="btn btn-wide primary" onclick="closeModal()" style="margin-top:8px;">閉じる</button>
  `);
}

function showDamage(targetId, text, cls = '') {
  setTimeout(() => {
    const target = document.getElementById(targetId);
    if (!target) return;
    const popup = document.createElement('div');
    popup.className = `damage-popup ${cls}`;
    popup.textContent = text;
    const rect = target.getBoundingClientRect();
    const parent = target.closest('.battle-arena');
    if (!parent) return;
    const parentRect = parent.getBoundingClientRect();
    popup.style.left = (rect.left - parentRect.left + rect.width / 2 - 20) + 'px';
    popup.style.top = (rect.top - parentRect.top) + 'px';
    parent.appendChild(popup);
    setTimeout(() => popup.remove(), 1000);
  }, 100);
}

function animateAttack(who) {
  const el = document.getElementById(who === 'player' ? 'player-fighter' : 'enemy-fighter');
  if (!el) return;
  const target = document.getElementById(who === 'player' ? 'enemy-fighter' : 'player-fighter');
  el.classList.add('attack');
  setTimeout(() => {
    if (target) target.classList.add('hit');
  }, 200);
  setTimeout(() => {
    el.classList.remove('attack');
    if (target) target.classList.remove('hit');
  }, 600);
}

/* =========================================
   PvP（対人戦）
   ========================================= */

function exportCharacter() {
  const data = {
    v: 1,
    n: game.character.name,
    m: game.character.mascot,
    s: game.stats,
    mh: game.maxHp,
    h: game.analysis.hash,
    t: game.analysis.traits.map(t => t.label),
    b: game.bossIndex,
    won: game.state === 'win'
  };
  const json = JSON.stringify(data);
  const encoded = btoa(unescape(encodeURIComponent(json)));
  let chk = 0;
  for (const ch of encoded) chk = (chk + ch.charCodeAt(0)) % 9973;
  return `MOCHI-${encoded}-${chk.toString(36)}`;
}

function importCharacter(code) {
  try {
    const m = code.trim().match(/^MOCHI-(.+)-([0-9a-z]+)$/);
    if (!m) throw new Error('形式が違います');
    const encoded = m[1];
    const chk = m[2];
    let chkCheck = 0;
    for (const ch of encoded) chkCheck = (chkCheck + ch.charCodeAt(0)) % 9973;
    if (chkCheck.toString(36) !== chk) throw new Error('チェックサムエラー');
    const json = decodeURIComponent(escape(atob(encoded)));
    const data = JSON.parse(json);
    return data;
  } catch (e) {
    return null;
  }
}

/* ========== 育成セーブデータ(localStorage 保存) ==========
   仕様:
   - 手動スロット最大3件(SAVE_SLOTS_MAX)
   - 自動セーブ枠1件(SAVE_AUTO_KEY): 週進行ごとに上書き
   - セーブ対象は育成中(game.state === 'play')のみ
   - analysis は名前から再計算で復元(保存不要)
   - rng は seed と内部状態を保存し、ロード時に再構築
   ========================================== */
const SAVE_INDEX_KEY = 'mojimoji_save_index_v1';
const SAVE_AUTO_KEY = 'mojimoji_save_auto_v1';
const SAVE_SLOT_PREFIX = 'mojimoji_save_slot_v1_';
const SAVE_SLOTS_MAX = 3;
const SAVE_VERSION = 1;

// セーブインデックス(スロット一覧のメタ情報のみ)を取得
function loadSaveIndex() {
  try {
    const raw = localStorage.getItem(SAVE_INDEX_KEY);
    if (!raw) return [];
    const arr = JSON.parse(raw);
    return Array.isArray(arr) ? arr : [];
  } catch (e) { return []; }
}
function writeSaveIndex(index) {
  try {
    localStorage.setItem(SAVE_INDEX_KEY, JSON.stringify(index));
    return true;
  } catch (e) { return false; }
}

// 現在の game 状態からセーブ用ペイロードを構築
function buildSavePayload() {
  if (!game.character || !game.character.name) return null;
  const rngState = (typeof game.rng === 'function' && typeof game.rng.getState === 'function')
    ? game.rng.getState() : null;
  return {
    v: SAVE_VERSION,
    savedAt: Date.now(),
    // キャラ再構築に必要な情報(analysis は名前から再計算)
    character: {
      name: game.character.name,
      mascot: game.character.mascot,
      createdAt: game.character.createdAt
    },
    rngState: rngState,
    // 進行
    week: game.week,
    maxWeek: game.maxWeek,
    stamina: game.stamina,
    maxStamina: game.maxStamina,
    money: game.money,
    // ステータス
    stats: { ...game.stats },
    baseStats: { ...game.baseStats },
    maxHp: game.maxHp,
    currentHp: game.currentHp,
    fatigue: game.fatigue,
    // ログ
    log: Array.isArray(game.log) ? game.log.slice(0, 50) : [],
    // ボス
    bossIndex: game.bossIndex,
    bossCandidates: Array.isArray(game.bossCandidates) ? [...game.bossCandidates] : null,
    bossDetermined: !!game.bossDetermined,
    // 育成カウンタ・モード
    trainCount: { ...(game.trainCount || {}) },
    focusMode: !!game.focusMode,
    focusBoost: game.focusBoost || 0,
    trialCleared: Array.isArray(game.trialCleared) ? [...game.trialCleared] : [false, false],
    purchasedItems: Array.isArray(game.purchasedItems) ? [...game.purchasedItems] : []
  };
}

// セーブペイロードを game に反映
function applySavePayload(payload) {
  if (!payload || !payload.character || !payload.character.name) return false;
  // analysis 再生成
  const analysis = analyzeName(payload.character.name);
  if (!analysis) return false;
  game.character = {
    name: payload.character.name,
    mascot: payload.character.mascot || analysis.mascot || '🐰',
    createdAt: payload.character.createdAt || Date.now()
  };
  game.analysis = analysis;
  // rng 復元(シードは analysis.hash、状態はセーブ値)
  game.rng = makeSeededRng(analysis.hash);
  if (payload.rngState != null && typeof game.rng.setState === 'function') {
    game.rng.setState(payload.rngState);
  }
  // 進行
  game.week = payload.week | 0;
  game.maxWeek = payload.maxWeek | 0;
  game.stamina = payload.stamina | 0;
  game.maxStamina = payload.maxStamina | 0;
  game.money = payload.money | 0;
  // ステータス
  game.stats = { ...(payload.stats || {}) };
  game.baseStats = { ...(payload.baseStats || {}) };
  game.maxHp = payload.maxHp | 0;
  game.currentHp = payload.currentHp | 0;
  game.fatigue = payload.fatigue | 0;
  // ログ
  game.log = Array.isArray(payload.log) ? payload.log.slice(0, 50) : [];
  // ボス
  game.bossIndex = payload.bossIndex | 0;
  game.bossCandidates = Array.isArray(payload.bossCandidates) ? [...payload.bossCandidates] : [game.bossIndex];
  game.bossDetermined = !!payload.bossDetermined;
  // 育成カウンタ・モード
  game.trainCount = { ...(payload.trainCount || { train: 0, study: 0, rest: 0, adventure: 0, special: 0 }) };
  game.focusMode = !!payload.focusMode;
  game.focusBoost = payload.focusBoost || 0;
  game.trialCleared = Array.isArray(payload.trialCleared) ? [...payload.trialCleared] : [false, false];
  game.purchasedItems = Array.isArray(payload.purchasedItems) ? [...payload.purchasedItems] : [];
  // 状態は必ず育成画面に固定(セーブは play 中にしか作られない想定)
  game.state = 'play';
  return true;
}

// 手動セーブをスロットに書き込み(slot=null なら空きスロット使用、slot指定なら上書き)
function saveToSlot(slot) {
  if (game.state !== 'play') return { ok: false, reason: '育成中のみ保存可能' };
  const payload = buildSavePayload();
  if (!payload) return { ok: false, reason: 'セーブ対象なし' };
  const index = loadSaveIndex();
  let targetSlot = slot;
  if (targetSlot == null) {
    // 空きを探す
    const used = new Set(index.map(e => e.slot));
    for (let i = 0; i < SAVE_SLOTS_MAX; i++) {
      if (!used.has(i)) { targetSlot = i; break; }
    }
    if (targetSlot == null) return { ok: false, reason: 'スロット満杯', full: true };
  }
  try {
    localStorage.setItem(SAVE_SLOT_PREFIX + targetSlot, JSON.stringify(payload));
  } catch (e) {
    return { ok: false, reason: '保存失敗(容量不足の可能性)' };
  }
  // インデックス更新
  const meta = {
    slot: targetSlot,
    name: payload.character.name,
    mascot: payload.character.mascot,
    week: payload.week,
    maxWeek: payload.maxWeek,
    savedAt: payload.savedAt
  };
  const filtered = index.filter(e => e.slot !== targetSlot);
  filtered.push(meta);
  filtered.sort((a, b) => a.slot - b.slot);
  writeSaveIndex(filtered);
  return { ok: true, slot: targetSlot };
}

// スロット読込
function loadFromSlot(slot) {
  try {
    const raw = localStorage.getItem(SAVE_SLOT_PREFIX + slot);
    if (!raw) return null;
    return JSON.parse(raw);
  } catch (e) { return null; }
}

// スロット削除
function deleteSlot(slot) {
  try {
    localStorage.removeItem(SAVE_SLOT_PREFIX + slot);
  } catch (e) {}
  const index = loadSaveIndex().filter(e => e.slot !== slot);
  writeSaveIndex(index);
}

// 自動セーブ書込み(週進行直後に呼ばれる)。失敗してもサイレント
function autoSave() {
  if (game.state !== 'play') return false;
  const payload = buildSavePayload();
  if (!payload) return false;
  try {
    localStorage.setItem(SAVE_AUTO_KEY, JSON.stringify(payload));
    return true;
  } catch (e) { return false; }
}
function loadAutoSave() {
  try {
    const raw = localStorage.getItem(SAVE_AUTO_KEY);
    if (!raw) return null;
    return JSON.parse(raw);
  } catch (e) { return null; }
}
function deleteAutoSave() {
  try { localStorage.removeItem(SAVE_AUTO_KEY); } catch (e) {}
}

// 全セーブデータ(手動+自動)を一覧用に取得
function listAllSaves() {
  const list = [];
  loadSaveIndex().forEach(meta => {
    list.push({ ...meta, type: 'manual' });
  });
  const auto = loadAutoSave();
  if (auto && auto.character) {
    list.push({
      type: 'auto',
      slot: 'auto',
      name: auto.character.name,
      mascot: auto.character.mascot,
      week: auto.week,
      maxWeek: auto.maxWeek,
      savedAt: auto.savedAt
    });
  }
  // 新しい順
  list.sort((a, b) => (b.savedAt || 0) - (a.savedAt || 0));
  return list;
}

// セーブデータが1件でも存在するか(タイトル画面のコンティニュー表示判定用)
function hasAnySave() {
  if (loadAutoSave()) return true;
  if (loadSaveIndex().length > 0) return true;
  return false;
}

// セーブ日時の人間可読フォーマット
function formatSaveTime(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  const hh = String(d.getHours()).padStart(2, '0');
  const mm = String(d.getMinutes()).padStart(2, '0');
  return `${y}/${m}/${day} ${hh}:${mm}`;
}

function onSaveSlotWrite(slot) {
  const r = saveToSlot(slot);

  } else {
    showToast(r.reason || '保存失敗');
  }
}

function onSaveSlotOverwrite(slot) {
  openModal(`
    <div class="modal-title">上書き確認</div>
    <p class="center small">スロット${slot + 1} の既存データを上書きします。よろしいですか?</p>
    <button class="btn danger btn-wide" onclick="onSaveSlotWrite(${slot})">⚠️ 上書きする</button>
    <button class="btn btn-wide" onclick="showSaveDialog()">← 戻る</button>
  `);
}

// タイトル画面からの「コンティニュー」で開くダイアログ
function showLoadDialog() {
  const saves = listAllSaves();
  if (saves.length === 0) {
    showToast('セーブデータがありません');
    return;
  }
  const rows = saves.map(s => {
    const isAuto = s.type === 'auto';
    const slotLabel = isAuto ? '自動セーブ' : `スロット${s.slot + 1}`;
    const slotKey = isAuto ? "'auto'" : String(s.slot);
    return `
      <div style="border:2px solid var(--c-text);border-radius:10px;padding:10px;margin-bottom:8px;background:${isAuto ? '#eef7ff' : '#fff'};">
        <div style="font-size:12px;color:var(--c-sub);">${slotLabel}</div>
        <div style="font-size:14px;font-weight:bold;">${s.mascot || ''} ${s.name}</div>
        <div style="font-size:11px;color:var(--c-sub);">${s.week}/${s.maxWeek}週 ・ ${formatSaveTime(s.savedAt)}</div>
        <div style="margin-top:6px;display:flex;gap:6px;">
          <button class="btn primary" style="flex:1;font-size:12px;" onclick="onLoadSelect(${slotKey})">▶ 続きから</button>
          <button class="btn danger" style="font-size:12px;" onclick="onDeleteConfirm(${slotKey})">🗑</button>
        </div>
      </div>
    `;
  }).join('');
  openModal(`
    <div class="modal-title">💾 コンティニュー</div>
    ${rows}
    <button class="btn btn-wide" onclick="closeModal()">キャンセル</button>
  `);
}

function onLoadSelect(slot) {
  const payload = (slot === 'auto') ? loadAutoSave() : loadFromSlot(slot);
  if (!payload) {
    showToast('読み込み失敗');
    return;
  }
  const ok = applySavePayload(payload);
  if (!ok) {
    showToast('データが壊れています');
    return;
  }
  closeModal();
  render();
  showToast('続きから再開');
}

function onDeleteConfirm(slot) {
  const label = (slot === 'auto') ? '自動セーブ' : `スロット${slot + 1}`;
  openModal(`
    <div class="modal-title">削除確認</div>
    <p class="center small">${label} を削除します。よろしいですか?</p>
    <button class="btn danger btn-wide" onclick="onDeleteExecute(${slot === 'auto' ? "'auto'" : slot})">🗑 削除する</button>
    <button class="btn btn-wide" onclick="showLoadDialog()">← 戻る</button>
  `);
}

function onDeleteExecute(slot) {
  if (slot === 'auto') deleteAutoSave();
  else deleteSlot(slot);
  showToast('削除しました');
  // 残データがあれば一覧へ、なければ閉じる
  if (hasAnySave()) showLoadDialog();
  else closeModal();
}

/* ========== キャラロースター(localStorage 保存) ========== */
const ROSTER_KEY = 'mojimoji_roster_v1';
const ROSTER_MAX = 12;

function loadRoster() {
  try {
    const raw = localStorage.getItem(ROSTER_KEY);
    if (!raw) return [];
    const arr = JSON.parse(raw);
    return Array.isArray(arr) ? arr : [];
  } catch (e) { return []; }
}
function saveRoster(roster) {
  try {
    localStorage.setItem(ROSTER_KEY, JSON.stringify(roster));
    return true;
  } catch (e) { return false; }
}
// 育成完了キャラをロースターに保存(コード文字列のまま保持)
function addToRoster(code, label) {
  const data = importCharacter(code);
  if (!data) return false;
  const roster = loadRoster();
  // 重複チェック(コード一致)
  if (roster.some(r => r.code === code)) {
    showToast('既に登録されています');
    return false;
  }
  if (roster.length >= ROSTER_MAX) {
    showToast(`ロースター満杯(${ROSTER_MAX}体)。古いものを削除してね`);
    return false;
  }
  roster.unshift({
    id: 'r' + Date.now().toString(36),
    code,
    name: data.n,
    mascot: data.m,
    summary: `体力:${data.mh} 攻:${data.s.atk} 防:${data.s.def} 速:${data.s.spd} 賢:${data.s.int} 運:${data.s.luk}`,
    label: label || data.n,
    savedAt: Date.now()
  });
  saveRoster(roster);
  return true;
}
function removeFromRoster(id) {
  const roster = loadRoster().filter(r => r.id !== id);
  saveRoster(roster);
}

/* ========== PVP セットアップ用一時状態 ========== */
const pvpSetup = {
  mySlot: null,    // { source: 'current'|'code'|'roster', data: importCharacterの戻り値 }
  enemySlot: null,
  initialized: false,  // pvpSetupInit を一度実行したか
  tab: 'battle',   // 'battle' | 'roster'
  // 各スロットで「選択UIを開いている」か(選択済み表示と切替)
  mySelecting: false,
  enemySelecting: false
};

function pvpSetupInit() {
  // 自分スロットの初期値: 現在の育成キャラがあれば自動セット
  if (game.character) {
    pvpSetup.mySlot = {
      source: 'current',
      data: {
        n: game.character.name,
        m: game.character.mascot,
        s: { ...game.stats },
        mh: game.maxHp,
        t: game.analysis ? game.analysis.traits.map(t => t.label) : []
      },
      label: `${game.character.name}(育成中)`
    };
  } else {
    pvpSetup.mySlot = null;
  }
  pvpSetup.enemySlot = null;
  pvpSetup.mySelecting = !pvpSetup.mySlot;     // 未選択ならいきなり選択UIを開く
  pvpSetup.enemySelecting = false;
  pvpSetup.initialized = true;
}

// PVPメニューから外に出る時に状態リセット(タイトルへ戻る等の際に呼ばれる)
function pvpSetupReset() {
  pvpSetup.initialized = false;
  pvpSetup.mySlot = null;
  pvpSetup.enemySlot = null;
  pvpSetup.mySelecting = false;
  pvpSetup.enemySelecting = false;
  pvpSetup.tab = 'battle';
}

function pvpSetSlot(slot, source, data, label) {
  if (slot === 'my') {
    pvpSetup.mySlot = { source, data, label };
    pvpSetup.mySelecting = false;
  } else {
    pvpSetup.enemySlot = { source, data, label };
    pvpSetup.enemySelecting = false;
  }
  render();
}

// 「変更」ボタン: 選択UIを開く(スロット内容はそのまま、表示モード切替)
function pvpOpenSelector(slot) {
  if (slot === 'my') pvpSetup.mySelecting = true;
  else pvpSetup.enemySelecting = true;
  render();
}

// 選択UIを閉じる(キャンセル)
function pvpCloseSelector(slot) {
  if (slot === 'my') pvpSetup.mySelecting = false;
  else pvpSetup.enemySelecting = false;
  render();
}

// スロット内容を空にする(明示的なクリア)
function pvpClearSlot(slot) {
  if (slot === 'my') {
    pvpSetup.mySlot = null;
    pvpSetup.mySelecting = true;
  } else {
    pvpSetup.enemySlot = null;
    pvpSetup.enemySelecting = true;
  }
  render();
}

function pvpSetTab(tab) {
  pvpSetup.tab = tab;
  render();
}

function pvpStartFromSetup() {
  if (!pvpSetup.mySlot || !pvpSetup.enemySlot) {
    showToast('両方のスロットにキャラをセットしてね');
    return;
  }
  // mySlot.source==='current' のときは従来通り game.character ベースで起動
  if (pvpSetup.mySlot.source === 'current') {
    startPvp(pvpSetup.enemySlot.data, null);
  } else {
    startPvp(pvpSetup.enemySlot.data, pvpSetup.mySlot.data);
  }
}

// コード入力用ハンドラ(両スロット共通)
function pvpImportToSlot(slot) {
  const ta = document.getElementById(slot === 'my' ? 'pvpCodeMy' : 'pvpCodeEnemy');
  if (!ta) return;
  const code = ta.value.trim();
  if (!code) { showToast('コードを入れてね'); return; }
  const data = importCharacter(code);
  if (!data) { showToast('コードが正しくありません'); return; }
  pvpSetSlot(slot, 'code', data, data.n);
  ta.value = '';
}

// ロースターから選択
function pvpPickFromRoster(slot, id) {
  const roster = loadRoster();
  const item = roster.find(r => r.id === id);
  if (!item) { showToast('キャラが見つからない'); return; }
  const data = importCharacter(item.code);
  if (!data) { showToast('保存データが壊れている'); return; }
  pvpSetSlot(slot, 'roster', data, item.label);
}

// ロースター追加(エクスポート画面・現キャラ用)
function pvpSaveCurrentToRoster() {
  if (!game.character) { showToast('育成キャラがないよ'); return; }

function pvpAction(action) {
  if (pvpState.ended) return;
  const me = pvpState.myChar.stats;
  const enemy = pvpState.enemyChar.stats;
  const r = Math.random;

  // 必殺技MPチェック
  if (action === 'special' && pvpState.myMp < SPECIAL_MP_COST) {
    showToast(`MPが足りません(${pvpState.myMp}/${SPECIAL_MP_COST})`);
    return;
  }
  // かいふくMPチェック
  if (action === 'heal' && pvpState.myMp < HEAL_MP_COST) {
    showToast(`MPが足りません(${pvpState.myMp}/${HEAL_MP_COST})`);
    return;
  }

  pvpState.turn++;
  pvpState.log.push(`━━ ターン${pvpState.turn} ━━`);

  // プレイヤー行動を履歴に追加
  pvpState.playerActionHistory.push(action);
  if (pvpState.playerActionHistory.length > 6) pvpState.playerActionHistory.shift();

  // ====== 敵AI(履歴を読む) ======
  const enemyHpRatio = pvpState.enemyHp / pvpState.enemyChar.maxHp;
  const myHpRatio = pvpState.myHp / pvpState.myChar.maxHp;
  const hist = pvpState.playerActionHistory;
  const recent = hist.slice(-4);
  const attackStreak = (() => {
    let n = 0;
    for (let i = hist.length - 1; i >= 0; i--) {
      if (hist[i] === 'attack') n++; else break;
    }
    return n;
  })();
  const lastAction = hist[hist.length - 1];
  const recentHealCount = recent.filter(a => a === 'heal').length;
  const recentGuardCount = recent.filter(a => a === 'guard').length;
  const hasSpecialMp = pvpState.enemyMp >= SPECIAL_MP_COST;

  let enemyAction;
  const aiR = r();

  // 優先順位:
  // 1) 回復(段階制): HP低いほど発動率上昇、healWorthwhileなキャラのみ
  //    新calcHeal式: int*2.5 が maxHp の 15% を超えるか
  //    かいふくにはMP30が必要なので hasHealMp も判定
  const enemyInt = enemy.int || 0;
  const healWorthwhile = enemyInt * 2.5 > pvpState.enemyChar.maxHp * 0.15;
  const hasHealMp = pvpState.enemyMp >= HEAL_MP_COST;
  if (healWorthwhile && hasHealMp && enemyHpRatio < 0.20 && aiR < 0.65) {
    enemyAction = 'heal';
  }
  else if (healWorthwhile && hasHealMp && enemyHpRatio < 0.35 && aiR < 0.35) {
    enemyAction = 'heal';
  }
  else if (healWorthwhile && hasHealMp && enemyHpRatio < 0.45 && aiR < 0.15) {
    enemyAction = 'heal';
  }
  // 2) 読みガード: プレイヤーがこうげき3連以上なら確率的にガードでカウンター狙い
  else if (attackStreak >= 3 && r() < Math.min(0.60, 0.20 + attackStreak * 0.10)) {
    enemyAction = 'guard';
  }
  // 2.5) ベースガード: プレイヤーの行動に関係なく一定確率でガードを混ぜる(フェイント)
  //      初手でも発動可能。読みを的中させない撹乱要素。
  else if (r() < 0.12) {
    enemyAction = 'guard';
  }
  // 3) ぼうぎょ直後(プレイヤー反撃バフ中)→必殺を撃つと反撃で増幅されるので、通常攻撃で様子見
  else if (lastAction === 'guard' && hasSpecialMp && r() < 0.5) {
    enemyAction = 'attack';
  }
  // 4) プレイヤーが回復/ガードに偏ってる→殴れるチャンス、必殺ほぼ確定
  else if ((recentHealCount + recentGuardCount) >= 2 && hasSpecialMp && r() < 0.90) {
    enemyAction = 'special';
  }
  // 5) MP満タンに近い&プレイヤーがガードでない状況なら必殺(確率大幅上昇)
  else if (hasSpecialMp && lastAction !== 'guard' && r() < 0.75) {
    enemyAction = 'special';
  }
  // 5.5) MPが90以上溜まっている場合は必殺を強く優先(MP溢れ防止)
  else if (pvpState.enemyMp >= 90 && r() < 0.70) {
    enemyAction = 'special';
  }
  // 6) 自分のHPが半分以下で攻撃を1回でも受けてる→ガードで凌ぐ(確率上昇)
  else if (enemyHpRatio < 0.50 && attackStreak >= 1 && r() < 0.30) {
    enemyAction = 'guard';
  }
  // 7) HP半分以下でMP余ってる&プレイヤーが攻撃寄り→ガードで反撃バフ仕込む
  else if (enemyHpRatio < 0.50 && r() < 0.15) {
    enemyAction = 'guard';
  }
  // 8) デフォルトは通常攻撃(MP溜まってる場合は必殺優先のしきい値1段階追加)
  else if (hasSpecialMp && r() < 0.30) {
    enemyAction = 'special';
  }
  else {
    enemyAction = 'attack';
  }

  // 必殺技/かいふくMP不足時のフォールバック
  if (enemyAction === 'special' && pvpState.enemyMp < SPECIAL_MP_COST) {
    enemyAction = 'attack';
  }
  if (enemyAction === 'heal' && pvpState.enemyMp < HEAL_MP_COST) {
    enemyAction = 'attack';
  }

  // 敵行動も履歴に保持
  pvpState.enemyActionHistory.push(enemyAction);
  if (pvpState.enemyActionHistory.length > 6) pvpState.enemyActionHistory.shift();

  // ガード状態をターン開始時に確定
  pvpState.myGuarding = (action === 'guard');
  pvpState.enemyGuarding = (enemyAction === 'guard');

  // 行動実行用クロージャ
  function performAction(actingAction, atkStats, defStats, isPlayer) {
    // isPlayer: trueなら自分が行動主、falseなら相手が行動主
    const buffNow = isPlayer ? pvpState.myBuff : pvpState.enemyBuff;
    const targetGuarding = isPlayer ? pvpState.enemyGuarding : pvpState.myGuarding;
    const damageTargetId = isPlayer ? 'pvp-enemy' : 'pvp-player';
    const actorName = isPlayer ? pvpState.myChar.name : pvpState.enemyChar.name;

    if (actingAction === 'attack') {
      const hit = checkHit(atkStats.spd, defStats.spd, r, atkStats.luk, defStats.luk);
      if (!hit) {
        showPvpDamage(damageTargetId, 'MISS', 'miss');
        pvpState.log.push(`${actorName}の攻撃は外れた!`);
        if (isPlayer) pvpState.myMp = Math.min(pvpState.myMaxMp, pvpState.myMp + MP_CHARGE.miss);
        else pvpState.enemyMp = Math.min(pvpState.enemyMaxMp, pvpState.enemyMp + MP_CHARGE.miss);
        return;
      }
      const crit = checkCrit(atkStats.luk, defStats.luk, r);
      let dmg = calcNormalDamage(atkStats.atk, defStats.def, r, crit, targetGuarding);
      if (buffNow > 0) dmg = Math.floor(dmg * 1.30);
      if (isPlayer) {
        pvpState.enemyHp = Math.max(0, pvpState.enemyHp - dmg);
        pvpState.myMp = Math.min(pvpState.myMaxMp, pvpState.myMp + MP_CHARGE.attack);
      } else {
        pvpState.myHp = Math.max(0, pvpState.myHp - dmg);
        pvpState.enemyMp = Math.min(pvpState.enemyMaxMp, pvpState.enemyMp + MP_CHARGE.attack);
      }
      showPvpDamage(damageTargetId, crit ? `${dmg}!` : dmg, crit ? 'crit' : '');
      pvpState.log.push(`${crit ? '会心! ' : ''}${buffNow > 0 ? '反撃! ' : ''}${actorName}の攻撃! ${targetGuarding ? '防がれて ' : ''}${dmg}ダメージ!`);
    } else if (actingAction === 'special') {
      if (isPlayer) pvpState.myMp -= SPECIAL_MP_COST;
      else pvpState.enemyMp -= SPECIAL_MP_COST;
      const dmg = calcSpecialDamage(atkStats.atk, atkStats.int, defStats.def, r, targetGuarding);
      if (isPlayer) pvpState.enemyHp = Math.max(0, pvpState.enemyHp - dmg);
      else pvpState.myHp = Math.max(0, pvpState.myHp - dmg);
      showPvpDamage(damageTargetId, `${dmg}!`, 'crit');
      pvpState.log.push(`${actorName}の必殺技! ${targetGuarding ? '一部防がれて ' : ''}${dmg}ダメージ!`);
    } else if (actingAction === 'guard') {
      if (isPlayer) {
        pvpState.myMp = Math.min(pvpState.myMaxMp, pvpState.myMp + MP_CHARGE.guard);
        pvpState.myBuff = 2;
      } else {
        pvpState.enemyMp = Math.min(pvpState.enemyMaxMp, pvpState.enemyMp + MP_CHARGE.guard);
        pvpState.enemyBuff = 2;
      }
      pvpState.log.push(`${actorName}は身を固めた! (MP+${MP_CHARGE.guard} / 次ターン反撃強化)`);
    } else if (actingAction === 'heal') {
      const maxHp = isPlayer ? pvpState.myChar.maxHp : pvpState.enemyChar.maxHp;
      const heal = calcHeal(atkStats.int, maxHp, r);
      const targetId = isPlayer ? 'pvp-player' : 'pvp-enemy';
      if (isPlayer) {
        pvpState.myMp = Math.max(0, pvpState.myMp - HEAL_MP_COST);
        const before = pvpState.myHp;
        pvpState.myHp = Math.min(maxHp, pvpState.myHp + heal);
        const actual = pvpState.myHp - before;
        showPvpDamage(targetId, `+${actual}`, 'heal');
        pvpState.log.push(`${actorName}は体力を${actual}回復! (MP-${HEAL_MP_COST})`);
      } else {
        pvpState.enemyMp = Math.max(0, pvpState.enemyMp - HEAL_MP_COST);
        const before = pvpState.enemyHp;
        pvpState.enemyHp = Math.min(maxHp, pvpState.enemyHp + heal);
        const actual = pvpState.enemyHp - before;
        showPvpDamage(targetId, `+${actual}`, 'heal');
        pvpState.log.push(`${actorName}は体力を${actual}回復! (MP-${HEAL_MP_COST})`);
      }
    }
  }

  // 先制判定
  const playerInit = me.spd + Math.floor(r() * 10);
  const enemyInit = enemy.spd + Math.floor(r() * 10);
  const playerFirst = playerInit >= enemyInit;

  function endTurn() {
    if (pvpState.myBuff > 0) pvpState.myBuff--;
    if (pvpState.enemyBuff > 0) pvpState.enemyBuff--;
  }

  // 30ターン経過時のジャッジ判定: 体力割合が高い側の勝利(同率は引き分け扱い→相手勝利)
  function judgeIfOvertime() {
    if (pvpState.ended || pvpState.turn < 30) return false;
    const myRatio = pvpState.myHp / pvpState.myChar.maxHp;
    const enemyRatio = pvpState.enemyHp / pvpState.enemyChar.maxHp;
    pvpState.log.push(`━━ 30ターン経過! ジャッジ判定! ━━`);
    pvpState.log.push(`体力割合 ${pvpState.myChar.name}:${Math.floor(myRatio*100)}% / ${pvpState.enemyChar.name}:${Math.floor(enemyRatio*100)}%`);
    endPvp(myRatio > enemyRatio, true);
    return true;
  }

  if (playerFirst) {
    performAction(action, me, enemy, true);
    setTimeout(() => {
      if (pvpState.enemyHp <= 0) { endTurn(); endPvp(true); render(); return; }
      performAction(enemyAction, enemy, me, false);
      endTurn();
      if (pvpState.myHp <= 0) { endPvp(false); render(); return; }
      judgeIfOvertime();
      render();
    }, 600);
  } else {
    performAction(enemyAction, enemy, me, false);
    setTimeout(() => {
      if (pvpState.myHp <= 0) { endTurn(); endPvp(false); render(); return; }
      performAction(action, me, enemy, true);
      endTurn();
      if (pvpState.enemyHp <= 0) { endPvp(true); render(); return; }
      judgeIfOvertime();
      render();
    }, 600);
  }
  render();
}

function endPvp(victory, byJudge = false) {
  pvpState.ended = true;
  pvpState.byJudge = byJudge;
  pvpState.log.push(victory ? (byJudge ? '⏱️ ジャッジ勝利!' : '🎉 勝利!') : (byJudge ? '⏱️ ジャッジ敗北...' : '💔 敗北...'));
  render();
}

function showPvpDamage(targetId, text, cls = '') {
  setTimeout(() => {
    const target = document.getElementById(targetId);
    if (!target) return;
    const popup = document.createElement('div');
    popup.className = `damage-popup ${cls}`;
    popup.textContent = text;
    const rect = target.getBoundingClientRect();
    const parent = target.closest('.battle-arena');
    if (!parent) return;
    const parentRect = parent.getBoundingClientRect();
    popup.style.left = (rect.left - parentRect.left + rect.width / 2 - 20) + 'px';
    popup.style.top = (rect.top - parentRect.top) + 'px';
    parent.appendChild(popup);
    setTimeout(() => popup.remove(), 1000);
  }, 100);
}

/* =========================================
   UI ヘルパー
   ========================================= */

/* モーダル表示。options.dismissable=false で Esc・closeModal による任意閉鎖を禁止。
   この場合、モーダル内に配置したボタン経由でのみ閉じられる(明示的選択を強制)。
   イベント結果や腕試しなど、回避不能な選択を行うモーダル用。 */
function openModal(html, options) {
  const modal = document.getElementById('modal');
  const dismissable = !options || options.dismissable !== false;
  document.getElementById('modalContent').innerHTML = html;
  if (dismissable) {
    modal.removeAttribute('data-non-dismissable');
  } else {
    modal.setAttribute('data-non-dismissable', 'true');
  }
  modal.classList.add('show');
}

/* モーダルを閉じる。force=true で非dismissableモーダルも強制的に閉じる
   (イベント結果の「続ける」ボタン等、内部処理から閉じる用) */
function closeModal(force) {
  const modal = document.getElementById('modal');
  if (!force && modal.getAttribute('data-non-dismissable') === 'true') {
    return; // 非dismissableは外部からの閉鎖を拒否
  }
  modal.removeAttribute('data-non-dismissable');
  modal.classList.remove('show');
}

function showToast(msg) {
  const t = document.createElement('div');
  t.textContent = msg;
  t.style.cssText = `
    position:fixed;top:20px;left:50%;transform:translateX(-50%);
    background:var(--c-text);color:white;padding:10px 20px;
    border-radius:20px;z-index:1000;font-size:14px;
    box-shadow:3px 3px 0 var(--c-shadow);
  `;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2000);
}

function render() {
  const app = document.getElementById('app');
  if (!app) return;

  if (game.state === 'title') {
    app.innerHTML = renderTitle();
  } else if (game.state === 'create') {
    app.innerHTML = renderCreate();
  } else if (game.state === 'preview') {
    app.innerHTML = renderPreview();
  } else if (game.state === 'play') {
    app.innerHTML = renderPlay();
  } else if (game.state === 'preBoss') {
    app.innerHTML = renderPreBoss();
  } else if (game.state === 'boss') {
    app.innerHTML = renderBoss();
  } else if (game.state === 'win' || game.state === 'lose') {
    app.innerHTML = renderEnding();
  } else if (game.state === 'pvpMenu') {
    app.innerHTML = renderPvpMenu();
  } else if (game.state === 'pvp') {
    app.innerHTML = renderPvp();
  } else if (game.state === 'pvpEnd') {
    app.innerHTML = renderPvpEnd();
  }
}

function onNameSubmit() {
  const input = document.getElementById('nameInput');
  const name = input.value.trim();
  if (!name) { showToast('名前を入れてね'); return; }
  if ([...name].length > 15) { showToast('15文字以内にしてね'); return; }
  if (createCharacter(name)) {
    game.state = 'preview';
    render();
  } else {
    showToast('名前が正しくないようです');
  }
}

function renderStatsGrid(showGrowth = false) {
  const g = game.analysis ? game.analysis.growthRates : {};
  return `
    <div class="stats-grid">
      ${STAT_KEYS.map(k => {
        const val = game.stats[k] || 0;
        const max = k === 'hp' ? 500 : 100;
        const percent = Math.min(100, (val / max) * 100);
        const growth = g[k] ? g[k] : 1;
        const growthText = showGrowth ? `<span class="stat-growth">×${growth.toFixed(2)}</span>` : '';
        const displayVal = k === 'hp' ? `${game.currentHp}/${game.maxHp}` : val;
        return `
          <div class="stat-row">
            <div class="stat-label">
              <span>${STAT_ICONS[k]} ${STAT_NAMES[k]}${growthText}</span>
              <b>${displayVal}</b>
            </div>
            <div class="stat-bar"><div class="stat-bar-fill ${k}" style="width:${k === 'hp' ? (game.currentHp / game.maxHp * 100) : percent}%"></div></div>
          </div>
        `;
      }).join('')}
    </div>
  `;
}

// ─────────────────────────────────────────────────
// 特性ヒント機能: ランダムに1つの特性の発動条件を提示
// ・analyzeName関数のソースから全pushTrait呼び出しを抽出してマスターリスト化
// ・「ハッシュ」等の専門用語をプレイヤー向けの表現に置換
// ─────────────────────────────────────────────────
let _traitHintCache = null;
function buildTraitMasterList() {
  if (_traitHintCache) return _traitHintCache;
  const src = analyzeName.toString();
  // pushTrait('label', 'type', 'condition', 'effect') を全件抽出
  const regex = /pushTrait\(\s*'([^']+)'\s*,\s*'([^']+)'\s*,\s*'([^']+)'\s*,\s*'([^']+)'\s*\)/g;
  const list = [];
  const seen = new Set();
  let m;
  while ((m = regex.exec(src)) !== null) {
    const label = m[1];
    // 同じ特性名(例: 潜在の方向違いバリエーション)は1つにまとめる
    if (seen.has(label)) continue;
    seen.add(label);
    list.push({ label, type: m[2], condition: m[3], effect: m[4] });
  }
  _traitHintCache = list;
  return list;
}
// 専門用語を平易な表現に置換
function humanizeCondition(cond) {
  return cond
    .replace(/名前ハッシュ下3桁が000/g, '名前から導かれる数字の下3桁が000')
    .replace(/名前ハッシュ下2桁/g, '名前から導かれる数字の下2桁')
    .replace(/名前ハッシュが(\d+)の倍数/g, '名前から導かれる数字が$1の倍数')
    .replace(/名前ハッシュを(\d+)で割って余り(\d+)/g, '名前から導かれる数字を$1で割った余りが$2')
    .replace(/ハッシュ%5=0\(攻型\)/g, '名前の刻印が攻型')
    .replace(/ハッシュ%5=1\(守型\)/g, '名前の刻印が守型')
    .replace(/ハッシュ%5=2\(速型\)/g, '名前の刻印が速型')
    .replace(/ハッシュ%5=3\(賢型\)/g, '名前の刻印が賢型')
    .replace(/ハッシュ%5=4\(運型\)/g, '名前の刻印が運型')
    .replace(/ハッシュ%3=0\(攻型\)/g, '名前の刻印が攻型')
    .replace(/ハッシュ%3=1\(速型\)/g, '名前の刻印が速型')
    .replace(/ハッシュ%3=2\(賢型\)/g, '名前の刻印が賢型')
    .replace(/ハッシュ奇数/g, '名前から導かれる数字が奇数')
    .replace(/ハッシュ偶数/g, '名前から導かれる数字が偶数')
    .replace(/ハッシュ末尾0/g, '名前から導かれる数字の末尾が0')
    .replace(/ハッシュ(\d+)の倍数/g, '名前から導かれる数字が$1の倍数')
    .replace(/ハッシュ%(\d+)が(\d+)以上の素数/g, '名前から導かれる数字を$1で割った余りが$2以上の素数')
    .replace(/ハッシュ%1009が(\d+)以上の素数/g, '名前から導かれる数字を1009で割った余りが$1以上の素数')
    .replace(/ハッシュ/g, '名前から導かれる数字'); // 残った「ハッシュ」を最後に置換
}
// 表示用ラベル(種別を日本語化)
function traitTypeLabel(type) {
  switch (type) {
    case 'positive': return '🔹 通常';
    case 'rare': return '👑 レア';
    case 'secret': return '✨ 隠し';
    case 'negative': return '⚠ 弱体';
    default: return type;
  }
}
// ランダムに1つの特性ヒントを生成(HTML文字列)
function generateRandomTraitHint() {
  const list = buildTraitMasterList();
  if (list.length === 0) return '';
  const pick = list[Math.floor(Math.random() * list.length)];
  const condText = humanizeCondition(pick.condition);
  const typeText = traitTypeLabel(pick.type);
  return `
    <div class="trait-hint">
      <div class="trait-hint-header">💡 今回知ったこと: 特性「${pick.label}」(${typeText})</div>
      <div class="trait-hint-cond"><b>発動条件:</b> ${condText}</div>
      <div class="trait-hint-effect"><b>効果:</b> ${pick.effect}</div>
    </div>
  `;
}

function restartSameName() {
  const name = game.character.name;
  createCharacter(name);
  game.state = 'preview';
  render();
}

function calcScore() {
  const total = STAT_KEYS.reduce((s, k) => s + game.stats[k], 0);
  const adjustedTotal = total + game.maxHp / 2;
  if (adjustedTotal >= 1200) return 5;
  if (adjustedTotal >= 960) return 4;
  if (adjustedTotal >= 750) return 3;
  if (adjustedTotal >= 540) return 2;
  return 1;
}

function getRank(score) {
  return ['', '銅級ハンター', '銀級ハンター', '金級ハンター', '白金級ハンター', '伝説の英雄'][score];
}

/* iframeのセキュリティ制限に対応した確実なコピー処理 */
function copyExport() {
  const text = document.getElementById('exportData').textContent;
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.select();
  try {
    const successful = document.execCommand('copy');
    if (successful) {
      showToast('コピーしました!');
    } else {
      showToast('コピーできませんでした。手動で範囲選択してコピーしてください。');
    }
  } catch(e) {
    showToast('コピーできませんでした。手動で範囲選択してコピーしてください。');
  }
  document.body.removeChild(ta);
}

      ${roster.length > 0 ? `

        <div style="border:1px solid var(--c-sub);border-radius:8px;padding:4px;background:white;">
          ${roster.map(r => `
            <div style="display:flex;align-items:center;gap:8px;padding:8px;border-bottom:1px dotted #ddd;">
              <div style="font-size:28px;">${r.mascot}</div>
              <div style="flex:1;min-width:0;">
                <div style="font-weight:bold;">${r.name}</div>
                <div class="small">${r.summary}</div>
              </div>
              <button class="btn" style="font-size:11px;padding:4px 8px;" onclick="pvpRemoveFromRoster('${r.id}')">🗑️</button>
            </div>
          `).join('')}
        </div>
      ` : `
        <div class="small" style="margin-top:8px;color:var(--c-sub);text-align:center;padding:20px;">まだ何も登録されていません</div>
      `}
    `;
  }

  return `
    <div class="panel" style="padding:12px;">
      <h2 style="text-align:center;color:var(--c-pink-deep);margin:0 0 10px;">⚔️ 対戦モード</h2>

      <div style="display:flex;gap:2px;margin-bottom:12px;border-radius:8px;overflow:hidden;border:1px solid var(--c-text);">
        <button style="${tabStyle(pvpSetup.tab === 'battle')}" onclick="pvpSetTab('battle')">⚔️ 対戦準備</button>
        <button style="${tabStyle(pvpSetup.tab === 'roster')}" onclick="pvpSetTab('roster')">📚 ロースター(${roster.length})</button>
      </div>

      ${pvpSetup.tab === 'battle' ? renderBattleTab() : renderRosterTab()}

      <button class="btn btn-wide" onclick="pvpSetupReset();goto('title');" style="margin-top:12px;">← タイトルへ戻る</button>
    </div>

    <div class="panel" style="font-size:12px;">
      <h3 style="font-size:14px;color:var(--c-pink-deep);margin-top:0;">💡 戦闘のコツ</h3>
      <ul style="padding-left:20px;line-height:1.7;">
        <li>戦闘はターン制。攻撃・必殺・防御・回復から選択</li>
        <li><b>ひっさつ</b>はMP60消費、<b>かいふく</b>はMP${HEAL_MP_COST}消費。こうげき・ぼうぎょでMPが溜まる</li>
        <li><b>ぼうぎょ</b>は被ダメ75%減・MP+25・次ターン反撃強化</li>
        <li><b>相手も賢く動く</b>: こうげき連発は読まれてガード&カウンターされる</li>
        <li>素早さは先制・命中率、賢さは必殺・回復(完全に賢さ依存!)、運はクリ率・命中・回避(運差大なら回避70%超も)</li>
        <li><b>30ターン経過</b>でジャッジ判定: 体力割合の高い側が勝利。長期戦は最大体力多い側が有利</li>
      </ul>
    </div>
  `;
}


// 旧 onImport は互換のため残す(タイトル等から直接呼ばれることはなくなったが、念のため)
function onImport() {
  const ta = document.getElementById('importCode') || document.getElementById('pvpCodeEnemy');
  if (!ta) return;
  const code = ta.value.trim();
  if (!code) { showToast('コードを入れてね'); return; }
  const data = importCharacter(code);
  if (!data) { showToast('コードが正しくありません'); return; }
  startPvp(data);
}

function renderPvp() {
  const me = pvpState.myChar.stats;
  const en = pvpState.enemyChar.stats;
  const myMpPct = (pvpState.myMp / pvpState.myMaxMp) * 100;
  const enMpPct = (pvpState.enemyMp / pvpState.enemyMaxMp) * 100;
  const canSpecial = pvpState.myMp >= SPECIAL_MP_COST;
  return `
    <div class="panel">
      <h2 style="text-align:center;color:var(--c-purple);margin:0 0 4px;">⚔️ 対人戦 ⚔️</h2>
      <div class="small center" style="margin-bottom:6px;color:var(--c-sub);">ターン ${pvpState.turn || 0}</div>

      <div class="battle-arena">
        <div class="battle-fighters">
          <div class="fighter">
            <div class="fighter-sprite" id="pvp-player">${pvpState.myChar.mascot}</div>
            <div class="fighter-name">${pvpState.myChar.name}</div>
            <div class="fighter-hp-bar"><div class="fighter-hp-bar-fill" style="width:${pvpState.myHp / pvpState.myChar.maxHp * 100}%"></div></div>
            <div class="small">体力: ${pvpState.myHp}/${pvpState.myChar.maxHp}</div>
            <div class="fighter-mp-bar"><div class="fighter-mp-bar-fill" style="width:${myMpPct}%"></div></div>
            <div class="small" style="color:${canSpecial ? 'var(--c-purple)' : 'var(--c-sub)'};font-weight:${canSpecial ? 'bold' : 'normal'};">MP: ${pvpState.myMp}/${pvpState.myMaxMp}</div>
            ${pvpState.myBuff > 0 ? `<div class="small" style="color:var(--c-red);font-weight:bold;">⚡反撃態勢</div>` : ''}
            <div class="fighter-stats-mini">
              <div title="攻撃">⚔️${me.atk}</div>
              <div title="防御">🛡️${me.def}</div>
              <div title="素早さ">💨${me.spd}</div>
              <div title="賢さ">📚${me.int}</div>
              <div title="運">🍀${me.luk}</div>
              <div title="体力">❤️${pvpState.myChar.maxHp}</div>
            </div>
          </div>
          <div style="align-self:center;font-size:24px;">⚔️</div>
          <div class="fighter enemy">
            <div class="fighter-sprite" id="pvp-enemy">${pvpState.enemyChar.mascot}</div>
            <div class="fighter-name">${pvpState.enemyChar.name}</div>
            <div class="fighter-hp-bar"><div class="fighter-hp-bar-fill" style="width:${pvpState.enemyHp / pvpState.enemyChar.maxHp * 100}%"></div></div>
            <div class="small">体力: ${pvpState.enemyHp}/${pvpState.enemyChar.maxHp}</div>
            <div class="fighter-mp-bar"><div class="fighter-mp-bar-fill" style="width:${enMpPct}%;background:#b04ad4;"></div></div>
            <div class="small">MP: ${pvpState.enemyMp}/${pvpState.enemyMaxMp}</div>
            ${pvpState.enemyBuff > 0 ? `<div class="small" style="color:var(--c-red);font-weight:bold;">⚡反撃態勢</div>` : ''}
            <div class="fighter-stats-mini">
              <div title="攻撃">⚔️${en.atk}</div>
              <div title="防御">🛡️${en.def}</div>
              <div title="素早さ">💨${en.spd}</div>
              <div title="賢さ">📚${en.int}</div>
              <div title="運">🍀${en.luk}</div>
              <div title="体力">❤️${pvpState.enemyChar.maxHp}</div>
            </div>
          </div>
        </div>

        <div style="display:flex;justify-content:space-between;align-items:center;margin:6px 0 2px;">
          <div class="small" style="font-weight:bold;color:var(--c-text);">📜 戦闘ログ</div>
          <button class="battle-log-view-btn" onclick="showFullBattleLog('pvp')">全ログ(${(pvpState.log || []).length})</button>
        </div>
        <div class="battle-log">
          ${renderBattleLogEntries(pvpState.log, 6)}
        </div>
      </div>

      ${pvpState.ended ? (() => {
        // 勝敗判定: 体力割合で
        const myFinalRatio = pvpState.myHp / pvpState.myChar.maxHp;
        const enFinalRatio = pvpState.enemyHp / pvpState.enemyChar.maxHp;
        const playerWon = pvpState.myHp > 0 && (pvpState.enemyHp <= 0 || myFinalRatio > enFinalRatio);
        const byJ = pvpState.byJudge;
        return `
        <div style="background:${playerWon ? '#fff0e0' : '#f0f0f0'};border:3px solid ${playerWon ? 'var(--c-pink-deep)' : 'var(--c-sub)'};border-radius:14px;padding:14px;margin-top:12px;text-align:center;">
          <div style="font-size:22px;font-weight:bold;color:${playerWon ? 'var(--c-pink-deep)' : 'var(--c-sub)'};margin-bottom:6px;">
            ${playerWon ? (byJ ? '⏱️ ジャッジ勝利!' : '🎉 勝利!') : (byJ ? '⏱️ ジャッジ敗北...' : '💔 敗北...')}
          </div>
          ${byJ ? `
            <div style="background:white;border-radius:8px;padding:8px;font-size:12px;margin-bottom:8px;">
              <div style="font-weight:bold;color:var(--c-purple);margin-bottom:4px;">30ターン経過によるジャッジ判定</div>
              <div style="display:flex;justify-content:space-around;">
                <div>
                  <div style="font-size:10px;">${pvpState.myChar.name}</div>
                  <div style="font-size:16px;font-weight:bold;color:${playerWon ? 'var(--c-pink-deep)' : 'var(--c-sub)'};">${Math.floor(myFinalRatio*100)}%</div>
                </div>
                <div style="align-self:center;">vs</div>
                <div>
                  <div style="font-size:10px;">${pvpState.enemyChar.name}</div>
                  <div style="font-size:16px;font-weight:bold;color:${!playerWon ? 'var(--c-red)' : 'var(--c-sub)'};">${Math.floor(enFinalRatio*100)}%</div>
                </div>
              </div>
            </div>
          ` : ''}
          <div class="small">${pvpState.turn}ターン経過</div>
        </div>
        <div class="center" style="margin-top:10px;">
          <button class="btn primary btn-wide" onclick="goto('pvpMenu')">対戦メニューへ</button>
          <button class="btn btn-wide" onclick="goto('title')">タイトルへ</button>
        </div>
      `;
      })() : `
        <div class="commands">
          <button class="cmd-btn train" onclick="pvpAction('attack')">
            <div class="cmd-icon">⚔️</div>
            <div class="cmd-name">こうげき</div>
            <div class="cmd-cost">MP+${MP_CHARGE.attack}</div>
          </button>
          <button class="cmd-btn special" onclick="pvpAction('special')" ${!canSpecial ? 'disabled' : ''}>
            <div class="cmd-icon">✨</div>
            <div class="cmd-name">ひっさつ</div>
            <div class="cmd-cost">MP-${SPECIAL_MP_COST}</div>
          </button>
          <button class="cmd-btn rest" onclick="pvpAction('guard')">
            <div class="cmd-icon">🛡️</div>
            <div class="cmd-name">ぼうぎょ</div>
            <div class="cmd-cost">MP+${MP_CHARGE.guard}</div>
          </button>
          <button class="cmd-btn study" onclick="pvpAction('heal')" ${pvpState.myMp < HEAL_MP_COST ? 'disabled' : ''}>
            <div class="cmd-icon">💚</div>
            <div class="cmd-name">かいふく</div>
            <div class="cmd-cost">MP-${HEAL_MP_COST}</div>
          </button>
        </div>
      `}
    </div>
  `;
}

/* =========================================
   画面遷移
   ========================================= */

function goto(state) {
  game.state = state;
  render();
}

/* =========================================
   初期化
   ========================================= */

Object.assign(window, {
  goto, showHowTo, onNameSubmit, doCommand, showShop, buyItem,
  selectEventChoice, confirmRestart, actuallyStartBoss, battleAction,
  showExport, copyExport, restartSameName, onImport, pvpAction, closeModal,
  closeEventResult,
  showTraining, doTraining, doWork, showStatusDetails,
  showFullBattleLog,
  // 集中モード・腕試し(新規)
  toggleFocus, acceptTrial, render,
  // PVP setup/roster
  pvpSetSlot, pvpClearSlot, pvpStartFromSetup, pvpImportToSlot,
  pvpPickFromRoster, pvpSaveCurrentToRoster, pvpSaveCodeToRoster, pvpRemoveFromRoster,
  pvpUseCurrentChar, pvpOpenSelector, pvpCloseSelector, pvpSetTab, pvpSetupReset,
  // セーブ/ロード
  showSaveDialog, showLoadDialog, onSaveSlotWrite, onSaveSlotOverwrite,
  onLoadSelect, onDeleteConfirm, onDeleteExecute,
  // ヘルプ
  showHelp
});

if (document.readyState === 'loading') {
  window.addEventListener('DOMContentLoaded', render);
} else {
  render();
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const ni = document.getElementById('nameInput');
    if (ni && document.activeElement === ni) {
      e.preventDefault();
      onNameSubmit();
    }
  }
  if (e.key === 'Escape') {
    const modal = document.getElementById('modal');
    if (modal.classList.contains('show')) {
      // 非dismissableモーダル(イベント結果・腕試しなど回避不能なもの)はEscで閉じない
      if (modal.getAttribute('data-non-dismissable') === 'true') {
        e.preventDefault();
        return;
      }
      closeModal();
    }
  }
});
</script>
