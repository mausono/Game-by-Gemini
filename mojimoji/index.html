<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>も字モJ!育成記 〜半年の冒険〜</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Kosugi+Maru&family=Mochiy+Pop+One&display=swap" rel="stylesheet">
<style>
  :root {
    --c-bg: #fef6e4;
    --c-bg2: #fff9ec;
    --c-pink: #f9b9c2;
    --c-pink-deep: #e98ba0;
    --c-mint: #b8e0d2;
    --c-yellow: #ffd66e;
    --c-blue: #a8d8ea;
    --c-purple: #c3a6e6;
    --c-text: #3d2c2e;
    --c-sub: #8b6f6f;
    --c-line: #f3d6c2;
    --c-shadow: rgba(60, 40, 40, 0.18);
    --c-red: #ff8b94;
    --c-green: #8dcb87;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    margin: 0; padding: 0;
    font-family: 'Kosugi Maru', sans-serif;
    background: var(--c-bg);
    color: var(--c-text);
    overflow-x: hidden;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    background-image:
      radial-gradient(circle at 10% 20%, rgba(249,185,194,0.25) 0px, transparent 30%),
      radial-gradient(circle at 90% 80%, rgba(184,224,210,0.25) 0px, transparent 30%),
      radial-gradient(circle at 50% 50%, rgba(255,214,110,0.15) 0px, transparent 40%);
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      radial-gradient(circle, rgba(255,255,255,0.4) 1px, transparent 1px);
    background-size: 20px 20px;
    pointer-events: none;
    z-index: 0;
  }

  #app {
    position: relative;
    z-index: 1;
    max-width: 720px;
    margin: 0 auto;
    padding: 16px;
    min-height: 100vh;
  }

  h1, h2, h3 {
    font-family: 'Mochiy Pop One', sans-serif;
    font-weight: normal;
    margin: 0;
  }

  .panel {
    background: var(--c-bg2);
    border: 3px solid var(--c-text);
    border-radius: 18px;
    padding: 18px;
    margin-bottom: 14px;
    box-shadow: 4px 4px 0 var(--c-shadow);
    position: relative;
  }

  .panel::before {
    content: '';
    position: absolute;
    inset: 4px;
    border: 1px dashed var(--c-line);
    border-radius: 14px;
    pointer-events: none;
  }

  .title-screen {
    text-align: center;
    padding: 20px 16px;
  }

  .game-logo {
    font-family: 'Mochiy Pop One', sans-serif;
    font-size: clamp(28px, 7vw, 42px);
    color: var(--c-pink-deep);
    text-shadow: 3px 3px 0 var(--c-yellow), 6px 6px 0 var(--c-text);
    margin: 20px 0 8px;
    letter-spacing: 0.05em;
    line-height: 1.3;
  }

  .game-sub {
    font-family: 'DotGothic16', sans-serif;
    color: var(--c-sub);
    font-size: clamp(12px, 3vw, 16px);
    margin-bottom: 24px;
  }

  .mascot {
    font-size: clamp(80px, 20vw, 120px);
    display: inline-block;
    animation: float 3s ease-in-out infinite;
    filter: drop-shadow(2px 4px 0 var(--c-shadow));
  }

  @keyframes float {
    0%, 100% { transform: translateY(0) rotate(-3deg); }
    50% { transform: translateY(-10px) rotate(3deg); }
  }

  .btn {
    font-family: 'Kosugi Maru', sans-serif;
    background: var(--c-pink);
    color: var(--c-text);
    border: 3px solid var(--c-text);
    border-radius: 12px;
    padding: 12px 22px;
    font-size: 15px;
    cursor: pointer;
    box-shadow: 3px 3px 0 var(--c-text);
    transition: all 0.1s;
    font-weight: bold;
    margin: 4px;
    min-height: 44px;
  }

  .btn:active, .btn:hover {
    transform: translate(2px, 2px);
    box-shadow: 1px 1px 0 var(--c-text);
  }

  .btn.primary { background: var(--c-yellow); }
  .btn.mint { background: var(--c-mint); }
  .btn.blue { background: var(--c-blue); }
  .btn.purple { background: var(--c-purple); }
  .btn.danger { background: var(--c-red); color: white; }
  .btn:disabled { background: #ddd; cursor: not-allowed; opacity: 0.6; transform: none; box-shadow: 3px 3px 0 var(--c-text); }

  .btn-wide { display: block; width: 100%; margin: 6px 0; }

  input[type="text"], textarea {
    font-family: 'Kosugi Maru', sans-serif;
    width: 100%;
    padding: 12px 14px;
    border: 3px solid var(--c-text);
    border-radius: 12px;
    background: white;
    font-size: 16px;
    margin: 8px 0;
    box-shadow: inset 2px 2px 0 rgba(0,0,0,0.05);
  }

  textarea {
    min-height: 100px;
    resize: vertical;
    font-family: 'DotGothic16', monospace;
    font-size: 12px;
    line-height: 1.5;
  }

  input[type="text"]:focus, textarea:focus {
    outline: none;
    border-color: var(--c-pink-deep);
  }

  /* キャラクターステータス */
  .char-header {
    display: flex;
    gap: 14px;
    align-items: center;
    margin-bottom: 14px;
  }

  .char-avatar {
    width: 80px; height: 80px;
    border-radius: 50%;
    background: var(--c-pink);
    border: 3px solid var(--c-text);
    display: flex; align-items: center; justify-content: center;
    font-size: 44px;
    box-shadow: 3px 3px 0 var(--c-shadow);
    flex-shrink: 0;
    position: relative;
    overflow: hidden;
  }

  .char-avatar.large {
    width: 120px; height: 120px;
    font-size: 64px;
    margin: 12px auto;
  }

  .char-info { flex: 1; min-width: 0; }
  .char-name {
    font-family: 'Mochiy Pop One', sans-serif;
    font-size: 20px;
    color: var(--c-pink-deep);
    margin: 0 0 4px;
    word-break: break-all;
  }
  .char-meta { font-size: 12px; color: var(--c-sub); }

  /* ステータスバー */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 8px;
  }

  .stat-row {
    background: white;
    border: 2px solid var(--c-text);
    border-radius: 10px;
    padding: 8px 10px;
    position: relative;
  }

  .stat-label {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    margin-bottom: 4px;
    font-weight: bold;
  }

  .stat-bar {
    height: 8px;
    background: #eee;
    border-radius: 4px;
    overflow: hidden;
    border: 1px solid var(--c-text);
  }

  .stat-bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.5s ease;
    background: linear-gradient(90deg, var(--c-pink), var(--c-pink-deep));
  }

  .stat-bar-fill.hp { background: linear-gradient(90deg, #ffb1b1, var(--c-red)); }
  .stat-bar-fill.atk { background: linear-gradient(90deg, #ffcc80, #ff8a3d); }
  .stat-bar-fill.def { background: linear-gradient(90deg, #a8d8ea, #5e9bc2); }
  .stat-bar-fill.spd { background: linear-gradient(90deg, #c5e8b7, var(--c-green)); }
  .stat-bar-fill.int { background: linear-gradient(90deg, #d4baef, var(--c-purple)); }
  .stat-bar-fill.luk { background: linear-gradient(90deg, #fff0a3, var(--c-yellow)); }

  .stat-growth {
    font-size: 10px;
    color: var(--c-sub);
    margin-left: 4px;
  }

  /* 進行情報 */
  .progress-info {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--c-mint);
    border: 2px solid var(--c-text);
    border-radius: 12px;
    padding: 10px 14px;
    margin-bottom: 10px;
    font-weight: bold;
  }

  .resource {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: white;
    padding: 4px 10px;
    border-radius: 20px;
    border: 2px solid var(--c-text);
    font-size: 13px;
  }

  /* コマンドボタン */
  .commands {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
  }

  .cmd-btn {
    background: white;
    border: 3px solid var(--c-text);
    border-radius: 14px;
    padding: 12px 8px;
    cursor: pointer;
    text-align: center;
    box-shadow: 3px 3px 0 var(--c-shadow);
    transition: all 0.1s;
    min-height: 90px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 4px;
  }

  .cmd-btn:active, .cmd-btn:hover {
    transform: translate(2px, 2px);
    box-shadow: 1px 1px 0 var(--c-shadow);
  }

  .cmd-btn.train { background: linear-gradient(135deg, #ffe0e6, #fff5e6); }
  .cmd-btn.study { background: linear-gradient(135deg, #e6f0ff, #e6f7ff); }
  .cmd-btn.rest { background: linear-gradient(135deg, #e8f5e9, #f1f8e9); }
  .cmd-btn.adventure { background: linear-gradient(135deg, #fff8e1, #ffe0b2); }
  .cmd-btn.special { background: linear-gradient(135deg, #f3e5f5, #e1bee7); }
  .cmd-btn.shop { background: linear-gradient(135deg, #ffebee, #ffcdd2); }

  .cmd-icon { font-size: 28px; }
  .cmd-name { font-size: 13px; font-weight: bold; }
  .cmd-cost { font-size: 10px; color: var(--c-sub); }
  .cmd-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* ログ */
  .log-area {
    background: #fff;
    border: 2px dashed var(--c-line);
    border-radius: 12px;
    padding: 10px 12px;
    max-height: 180px;
    overflow-y: auto;
    font-size: 13px;
    line-height: 1.6;
  }

  .log-entry {
    padding: 4px 0;
    border-bottom: 1px dotted var(--c-line);
    animation: fadeIn 0.4s;
  }
  .log-entry:last-child { border-bottom: none; }
  .log-entry.event { color: var(--c-pink-deep); font-weight: bold; }
  .log-entry.battle { color: #d04050; font-weight: bold; }
  .log-entry.gain { color: var(--c-green); font-weight: bold; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-5px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* モーダル */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(60, 40, 40, 0.6);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 16px;
    animation: fadeIn 0.2s;
  }
  .modal-overlay.show { display: flex; }

  .modal {
    background: var(--c-bg2);
    border: 4px solid var(--c-text);
    border-radius: 20px;
    padding: 22px;
    max-width: 460px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 6px 6px 0 rgba(0,0,0,0.3);
    animation: pop 0.3s;
    position: relative;
  }

  @keyframes pop {
    0% { transform: scale(0.8); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }

  .modal-title {
    font-family: 'Mochiy Pop One', sans-serif;
    color: var(--c-pink-deep);
    font-size: 22px;
    margin-bottom: 12px;
    text-align: center;
  }

  /* バトル画面 */
  .battle-arena {
    background: linear-gradient(180deg, #ffdfe5 0%, #fff5e1 100%);
    border: 3px solid var(--c-text);
    border-radius: 16px;
    padding: 14px;
    margin-bottom: 12px;
    position: relative;
    overflow: hidden;
  }

  .battle-arena::before {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 30%;
    background: linear-gradient(180deg, transparent, rgba(255,255,255,0.4));
  }

  .battle-fighters {
    display: flex;
    justify-content: space-around;
    align-items: flex-end;
    margin-bottom: 12px;
    position: relative;
    z-index: 1;
  }

  .fighter {
    text-align: center;
    transition: transform 0.3s;
    flex: 1;
    min-width: 0;
    max-width: 45%;
  }

  .fighter-sprite {
    font-size: 64px;
    filter: drop-shadow(2px 4px 0 var(--c-shadow));
    margin-bottom: 4px;
    display: inline-block;
    transition: transform 0.3s;
  }

  .fighter.hit .fighter-sprite {
    animation: shake 0.4s;
  }
  .fighter.attack .fighter-sprite {
    animation: lunge 0.5s;
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-8px) rotate(-5deg); }
    75% { transform: translateX(8px) rotate(5deg); }
  }
  @keyframes lunge {
    0%, 100% { transform: translateX(0); }
    50% { transform: translateX(20px) scale(1.1); }
  }
  .fighter.enemy.attack .fighter-sprite {
    animation: lungeLeft 0.5s;
  }
  @keyframes lungeLeft {
    0%, 100% { transform: translateX(0); }
    50% { transform: translateX(-20px) scale(1.1); }
  }

  .fighter-name { font-weight: bold; font-size: 13px; }
  .fighter-hp-bar {
    width: 110px;
    height: 12px;
    background: #ddd;
    border: 2px solid var(--c-text);
    border-radius: 6px;
    margin: 4px auto;
    overflow: hidden;
  }
  .fighter-hp-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #ffb1b1, var(--c-red));
    transition: width 0.4s;
  }
  .fighter-mp-bar {
    width: 110px;
    height: 8px;
    background: #ddd;
    border: 2px solid var(--c-text);
    border-radius: 5px;
    margin: 2px auto 0;
    overflow: hidden;
  }
  .fighter-mp-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #c1ccff, #5468cc);
    transition: width 0.4s;
  }

  .damage-popup {
    position: absolute;
    font-family: 'Mochiy Pop One', sans-serif;
    font-size: 32px;
    font-weight: bold;
    color: #ff3030;
    text-shadow: 2px 2px 0 white, 3px 3px 0 var(--c-text);
    pointer-events: none;
    z-index: 5;
    animation: damageFloat 1s forwards;
  }
  .damage-popup.heal { color: var(--c-green); }
  .damage-popup.crit { color: #ff00aa; font-size: 40px; }
  .damage-popup.miss { color: #888; font-size: 24px; }

  @keyframes damageFloat {
    0% { opacity: 1; transform: translateY(0) scale(0.5); }
    50% { transform: translateY(-40px) scale(1.2); }
    100% { opacity: 0; transform: translateY(-70px) scale(1); }
  }

  .battle-log {
    background: rgba(255,255,255,0.85);
    border: 2px solid var(--c-line);
    border-radius: 10px;
    padding: 8px;
    min-height: 80px;
    max-height: 140px;
    overflow-y: auto;
    font-size: 12px;
    line-height: 1.5;
  }
  .battle-log-entry {
    padding: 3px 6px;
    margin: 2px 0;
    border-radius: 5px;
    border-left: 3px solid #ccc;
    word-break: break-word;
  }
  .battle-log-entry.log-turn {
    background: #f0e8ff;
    border-left-color: #8a4af3;
    font-weight: bold;
    color: var(--c-purple);
    text-align: center;
    font-size: 11px;
  }
  .battle-log-entry.log-attack {
    background: #ffe8e0;
    border-left-color: #e8552c;
  }
  .battle-log-entry.log-special {
    background: #f3e8ff;
    border-left-color: #b04ad4;
  }
  .battle-log-entry.log-guard {
    background: #e0f0ff;
    border-left-color: #2c8de8;
  }
  .battle-log-entry.log-heal {
    background: #e8ffe8;
    border-left-color: #2cb04a;
  }
  .battle-log-entry.log-result {
    background: #fff8d0;
    border-left-color: #d4a02c;
    font-weight: bold;
  }

  /* ステータス常時表示用 */
  .fighter-stats-mini {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 2px;
    font-size: 9px;
    color: var(--c-sub);
    margin-top: 4px;
    text-align: center;
  }
  .fighter-stats-mini > div {
    background: rgba(255,255,255,0.7);
    border-radius: 3px;
    padding: 1px 2px;
    white-space: nowrap;
  }
  .battle-log-view-btn {
    font-size: 11px;
    padding: 3px 10px;
    margin-top: 4px;
    background: white;
    border: 1px solid var(--c-text);
    border-radius: 6px;
    cursor: pointer;
  }

  /* タブ */
  .tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 12px;
    overflow-x: auto;
  }
  .tab {
    flex: 1;
    background: white;
    border: 2px solid var(--c-text);
    border-radius: 10px 10px 0 0;
    padding: 8px 6px;
    cursor: pointer;
    text-align: center;
    font-size: 13px;
    font-weight: bold;
    border-bottom: none;
    min-width: 80px;
  }
  .tab.active {
    background: var(--c-yellow);
    transform: translateY(-2px);
  }

  /* 文字解析結果 */
  .analysis-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    font-size: 12px;
    margin-top: 10px;
  }
  .analysis-item {
    background: white;
    border: 1px solid var(--c-line);
    border-radius: 6px;
    padding: 6px 8px;
  }

  /* 特性リスト（詳細表示化） */
  .traits-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: 10px;
  }
  .trait-card {
    background: white;
    border: 1px solid var(--c-line);
    border-radius: 8px;
    padding: 10px;
    font-size: 12px;
  }
  .trait-card-title {
    margin-bottom: 6px;
  }
  .trait-card-desc {
    color: var(--c-sub);
    line-height: 1.5;
  }

  .trait-chip {
    background: var(--c-yellow);
    border: 2px solid var(--c-text);
    border-radius: 14px;
    padding: 3px 10px;
    font-size: 11px;
    font-weight: bold;
    display: inline-block;
    color: var(--c-text);
    line-height: 1.4;
    white-space: normal;
    word-break: break-all;
    min-height: 22px;
    min-width: 40px;
  }
  /* 通常特性 — オレンジ */
  .trait-chip.positive {
    background: linear-gradient(135deg, #ffb347, #ff8c2a);
    border-color: #c25a00;
    color: #3a1a00;
  }
  /* 弱化特性 — 黒っぽい赤 */
  .trait-chip.negative {
    background: linear-gradient(135deg, #6e0a0a, #3a0303);
    border-color: #1a0000;
    color: #ffd0d0;
    text-shadow: 0 1px 2px rgba(0,0,0,0.6);
  }
  /* レア特性 — 紫 */
  .trait-chip.rare {
    background: linear-gradient(135deg, #9b5cd1, #5e2a99);
    border-color: #3a1466;
    color: #fff;
    box-shadow: 0 0 6px rgba(155, 92, 209, 0.5);
  }
  /* 隠し特性 — メタリックな金 */
  .trait-chip.secret {
    background: linear-gradient(135deg, #fff5b8 0%, #f5c542 25%, #b8860b 50%, #f5c542 75%, #fff5b8 100%);
    background-size: 200% 200%;
    color: #2a1a00;
    border-color: #8b6914;
    box-shadow: 0 0 10px rgba(212, 175, 55, 0.8), inset 0 0 4px rgba(255, 255, 255, 0.4);
    text-shadow: 0 1px 1px rgba(255, 255, 255, 0.6);
    animation: secret-shimmer 3s linear infinite;
  }
  @keyframes secret-shimmer {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }
  /* デバッグ特性 — 輝く虹色(維持) */
  .trait-chip.debug {
    background: linear-gradient(135deg, #00ff88, #00d4ff, #ff00ff);
    background-size: 200% 200%;
    color: white;
    border: 2px solid #fff;
    text-shadow: 0 0 4px rgba(0,0,0,0.8);
    box-shadow: 0 0 12px rgba(255,0,255,0.8), 0 0 24px rgba(0,255,255,0.6);
    animation: debug-glow 2s linear infinite;
  }
  @keyframes debug-glow {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  /* エンディング */
  .ending-screen {
    text-align: center;
    padding: 20px;
  }
  .ending-title {
    font-family: 'Mochiy Pop One', sans-serif;
    font-size: 32px;
    margin: 16px 0;
    text-shadow: 2px 2px 0 var(--c-yellow);
  }
  .ending-title.win { color: var(--c-pink-deep); }
  .ending-title.lose { color: var(--c-sub); }

  .star-rating {
    font-size: 36px;
    margin: 12px 0;
    letter-spacing: 4px;
  }

  /* エンディング時の特性ヒントカード */
  .trait-hint {
    background: linear-gradient(135deg, #fff9ec 0%, #fef0e0 100%);
    border: 2px dashed var(--c-pink-deep);
    border-radius: 12px;
    padding: 12px 14px;
    margin: 16px 0;
    text-align: left;
  }
  .trait-hint-header {
    font-family: 'Mochiy Pop One', sans-serif;
    font-size: 13px;
    color: var(--c-pink-deep);
    margin-bottom: 6px;
    display: flex;

// 名前ハッシュから「ボス候補3体」を決定する
// ハッシュベースで疑似ランダムに重複なし選出
function pickBossCandidates(hash) {
  const indices = [];
  let seed = hash;
  const pool = [...Array(BOSSES.length).keys()];
  for (let i = 0; i < 3 && pool.length > 0; i++) {
    seed = (seed * 1103515245 + 12345) & 0x7fffffff;
    const pickIdx = seed % pool.length;
    indices.push(pool[pickIdx]);
    pool.splice(pickIdx, 1);
  }
  return indices;
}

// 候補の中から育成結果(プレイヤーの突出ステータス)に応じて最終ボスを決定
// プレイヤーが特化している方向に「強い相手(counterForに該当)」を選ぶ
function determineFinalBoss() {
  if (game.bossDetermined) return;
  const candidates = game.bossCandidates || [game.bossIndex];
  if (candidates.length === 1) { game.bossIndex = candidates[0]; game.bossDetermined = true; return; }
  // プレイヤーの主要ステータス(最大2項目)を特定
  const stats = game.stats;
  const statEntries = [
    { k: 'hp', v: game.maxHp },
    { k: 'atk', v: stats.atk },
    { k: 'def', v: stats.def },
    { k: 'spd', v: stats.spd },
    { k: 'int', v: stats.int },
    { k: 'luk', v: stats.luk }
  ];
  // HPは桁が違うのでnormalizeしてランク化
  // 各ステを「成長率の中央値=1.0」想定で相対化
  const avg = (statEntries.slice(1).reduce((a,b)=>a+b.v,0)) / 5; // hp除外で平均
  const hpAvg = game.maxHp / 5; // HPは5倍スケール想定で平均比較
  const normalized = statEntries.map(e => {
    const norm = e.k === 'hp' ? e.v / hpAvg : e.v / Math.max(1, avg);
    return { k: e.k, score: norm };
  });
  normalized.sort((a, b) => b.score - a.score);
  const topStats = normalized.slice(0, 2).map(x => x.k); // 上位2ステ

  // 各候補にスコア付け
  const scored = candidates.map(ci => {
    const boss = BOSSES[ci];
    let score = 0;
    for (const ts of topStats) {
      if (boss.counterFor && boss.counterFor.includes(ts)) {
        score += 2; // このボスは該当ステ特化を苦手とさせる
      }
    }
    // overlordは全方位→出現率を少し下げる(score-1)
    if (boss.tag === 'overlord') score -= 1;
    // ハッシュベースのノイズを加えて多様性確保
    const noise = ((game.analysis ? game.analysis.hash : 0) ^ (ci * 7919)) % 100 / 100;
    score += noise * 0.5;
    return { ci, score };
  });
  scored.sort((a, b) => b.score - a.score);
  game.bossIndex = scored[0].ci;
  game.bossDetermined = true;
}

  { label: '二刀流', condition: '2文字＆異なる文字種2種' },
  { label: '熟語', condition: '2文字とも漢字' },
  { label: '二音律', condition: '2文字ともに母音' },
  { label: '双子', condition: '2文字が完全に同一' },
  { label: '重ね響き', condition: '2文字が同じ文字種で異字(漢字2字を除く)' },
  { label: '三才', condition: '3文字が同じ文字種で2字以上異字' },
  { label: '短歌の調', condition: '3文字でひらがなを含む(全てではない)' },
  { label: '三位一体', condition: '3文字で異なる文字種3種' },
  { label: '端正', condition: '2〜3文字＆全文字異(二刀流・重ね響き・三位一体の条件を除く)' },
  { label: '潜在', condition: '名前が3文字以下(宿命数で攻型/守型/速型/賢型/運型に分岐)' },
  { label: '電光', condition: '3文字以下＆宿命数の下2桁が11以上の素数' },
  { label: '極小', condition: '名前が1〜2文字(宿命数で攻型/速型/賢型に分岐)' },
  // ⑬中域穴埋め
  { label: '百花繚乱', condition: '5〜10文字＆全文字異＆漢字とひらがなが両方含まれる' },
  { label: '中庸', condition: '5〜9文字＆母音率4〜6割' },
  // ⑭弱化特性
  { label: '停滞', condition: '3文字以上で全文字が同一' },
  { label: '喧噪', condition: '記号類を2つ以上含む(3文字以上)' },
  // ⑮高条件隠し
  { label: '五行円融', condition: '1文字漢字＆宿命数が5の倍数' },
  { label: '古の真名', condition: '2文字漢字＆回文＆宿命数が7の倍数' },
  { label: '五行均衡', condition: '5・10・15文字＆5種(ひら・カナ・漢・英・数)が全て同じ個数' }
];

/* =========================================
   名前解析エンジン
   ========================================= */

function analyzeName(name) {
  if (!name || !name.trim()) return null;
  name = name.trim();

  const analysis = {
    name,
    length: [...name].length,
    chars: [...name],
    types: { hiragana: 0, katakana: 0, kanji: 0, latin: 0, digit: 0, other: 0 },
    vowels: 0,
    consonants: 0,
    repeated: 0,
    palindrome: false,
    hash: 0,
    traits: [],
    growthRates: {} // 各ステータスの成長補正
  };

  // 文字種カウント
  for (const ch of analysis.chars) {
    const code = ch.codePointAt(0);
    if (code >= 0x3040 && code <= 0x309F) analysis.types.hiragana++;
    else if (code >= 0x30A0 && code <= 0x30FF) analysis.types.katakana++;
    else if ((code >= 0x4E00 && code <= 0x9FFF) || (code >= 0x3400 && code <= 0x4DBF)) analysis.types.kanji++;
    else if ((code >= 0x41 && code <= 0x5A) || (code >= 0x61 && code <= 0x7A)) analysis.types.latin++;
    else if (code >= 0x30 && code <= 0x39) analysis.types.digit++;
    else analysis.types.other++;
  }

  // ハッシュ値（決定論的乱数シード）
  let hash = 5381;
  for (const ch of analysis.chars) {
    hash = ((hash << 5) + hash) + ch.codePointAt(0);
    hash = hash & 0xFFFFFFFF;
  }
  analysis.hash = Math.abs(hash);

  // 母音/子音（ひらがな/カタカナ/英字）
  const vowelKana = /[あいうえおアイウエオぁぃぅぇぉっゃゅょァィゥェォ]/;
  const vowelEn = /[aeiouAEIOU]/;
  for (const ch of analysis.chars) {
    if (vowelKana.test(ch) || vowelEn.test(ch)) analysis.vowels++;
    else if (/[a-zA-Zぁ-んァ-ン]/.test(ch)) analysis.consonants++;
  }

  // 連続する同じ文字
  for (let i = 1; i < analysis.chars.length; i++) {
    if (analysis.chars[i] === analysis.chars[i-1]) analysis.repeated++;
  }

  // 回文判定
  analysis.palindrome = analysis.chars.length >= 2 &&
    analysis.chars.join('') === [...analysis.chars].reverse().join('');

  // ─── 成長率（基準1.0、特性により変動） ───
  const g = { hp: 1.0, atk: 1.0, def: 1.0, spd: 1.0, int: 1.0, luk: 1.0 };
  const pushTrait = (label, type, condition, effect) => {
    analysis.traits.push({ label, type, condition, effect });
  };

  // ─── 補助変数 ───
  const L = analysis.length;
  const lastCh = analysis.chars[analysis.chars.length - 1];
  const firstCh = analysis.chars[0];
  const vowelRatio = analysis.vowels / Math.max(1, analysis.vowels + analysis.consonants);
  const usedTypes = Object.values(analysis.types).filter(v => v > 0).length;
  const uniqueChars = new Set(analysis.chars);
  const isPrime = (n) => {
    if (n < 2) return false;
    for (let i = 2; i * i <= n; i++) if (n % i === 0) return false;
    return true;
  };
  const FIB = [1, 2, 3, 5, 8, 13, 21];
  let maxRun = 1, curRun = 1;
  for (let i = 1; i < analysis.chars.length; i++) {
    if (analysis.chars[i] === analysis.chars[i-1]) { curRun++; maxRun = Math.max(maxRun, curRun); }
    else curRun = 1;
  }
  const hasHandakuten = analysis.chars.some(ch => /[パピプペポぱぴぷぺぽ]/.test(ch));
  const hasDakuten = /[がぎぐげござじずぜぞだぢづでどばびぶべぼガギグゲゴザジズゼゾダヂヅデドバビブベボ]/.test(firstCh);

  // ─────────────────────────────────────────────────
  // ①【文字数特性】── 排他制御。長さで唯一一つだけ発動
  // ─────────────────────────────────────────────────
  if (L === 1) {
    g.atk += 0.35; g.spd += 0.25; g.luk += 0.20; g.hp += 0.10; g.def -= 0.05; g.int -= 0.05;
    pushTrait('一閃', 'rare', '名前がちょうど1文字', '攻撃+35%, 素早さ+25%, 運+20%, 体力+10% / 防御-5%, 賢さ-5%');
  } else if (L === 2) {
    g.spd += 0.30; g.atk += 0.20; g.luk += 0.15; g.hp += 0.10; g.def -= 0.05;
    pushTrait('俊敏型', 'positive', '名前が2文字', '素早さ+30%, 攻撃+20%, 運+15%, 体力+10% / 防御-5%');
  } else if (L === 3) {
    g.atk += 0.10; g.spd += 0.10; g.def += 0.10; g.hp += 0.13; g.int += 0.08; g.luk += 0.13;
    pushTrait('バランス型', 'positive', '名前が3文字', '攻撃・素早さ・防御+10%, 体力・運+13%, 賢さ+8%');
  } else if (L === 4) {
    g.atk += 0.10; g.spd += 0.10; g.def += 0.10; g.int += 0.08; g.hp += 0.13; g.luk += 0.10;
    pushTrait('四方型', 'positive', '名前が4文字', '攻撃・素早さ・防御+10%, 体力+13%, 運+10%, 賢さ+8%');
  } else if (L === 6) {
    g.atk += 0.18; g.def += 0.18; g.int += 0.18; g.spd += 0.18; g.hp -= 0.05; g.luk -= 0.05;
    pushTrait('六調', 'rare', '名前がちょうど6文字', '攻撃・防御・素早さ・賢さ+18% / 体力・運-5%');
  } else if (L <= 7) {
    g.hp += 0.30; g.def += 0.20; g.luk += 0.12; g.atk -= 0.08; g.spd -= 0.05;
    pushTrait('安定型', 'positive', '名前が5・7文字', '体力+30%, 防御+20%, 運+12% / 攻撃-8%, 素早さ-5%');
  } else if (L <= 10) {
    g.int += 0.20; g.hp += 0.25; g.atk += 0.10; g.def += 0.15; g.spd -= 0.15;
    pushTrait('熟練型', 'positive', '名前が8〜10文字', '賢さ+20%, 体力+25%, 攻撃+10%, 防御+15% / 素早さ-15%');
  } else if (L <= 12) {
    g.int += 0.30; g.hp += 0.30; g.def += 0.15; g.atk += 0.05; g.spd -= 0.30; g.luk -= 0.10;
    pushTrait('賢者型', 'rare', '名前が11〜12文字', '賢さ+30%, 体力+30%, 防御+15%, 攻撃+5% / 素早さ-30%, 運-10%');
  } else {
    g.int += 0.35; g.hp += 0.40; g.def += 0.25; g.atk += 0.10; g.spd -= 0.40; g.luk -= 0.10;
    pushTrait('長老の貫禄', 'rare', '名前が13文字以上', '賢さ+35%, 体力+40%, 防御+25%, 攻撃+10% / 素早さ-40%, 運-10%');
  }

  // ─────────────────────────────────────────────────
  // ②【文字種主体特性】── 最大占有率の文字種で一つ
  // ─────────────────────────────────────────────────
  const typeRatios = {
    hiragana: analysis.types.hiragana / L,
    katakana: analysis.types.katakana / L,
    kanji: analysis.types.kanji / L,
    latin: analysis.types.latin / L
  };
  if (typeRatios.hiragana >= 0.6 && L >= 2 && !(analysis.types.hiragana === L && L >= 2 && L <= 5)) {
    g.hp += 0.30; g.luk += 0.20; g.int += 0.10; g.atk -= 0.08;
    pushTrait('やわらか', 'positive', 'ひらがなが6割以上(2文字以上・純真の条件を除く)', '体力+30%, 運+20%, 賢さ+10% / 攻撃-8%');
  } else if (typeRatios.katakana >= 0.6 && L >= 2) {
    g.spd += 0.22; g.atk += 0.22; g.int += 0.10; g.luk += 0.10; g.def -= 0.08;
    pushTrait('鋭利', 'positive', 'カタカナが6割以上(2文字以上)', '素早さ・攻撃+22%, 賢さ・運+10% / 防御-8%');
  } else if (typeRatios.kanji >= 0.5 && L >= 2 && !(L === 2 && analysis.types.kanji === 2)) {
    g.atk += 0.25; g.def += 0.25; g.hp += 0.15; g.spd -= 0.10; g.luk -= 0.05;
    pushTrait('威厳', 'positive', '漢字が5割以上(2文字以上・2文字漢字を除く)', '攻撃+25%, 防御+25%, 体力+15% / 素早さ-10%, 運-5%');
  } else if (typeRatios.latin >= 0.5 && L >= 2) {
    g.int += 0.30; g.spd += 0.20; g.luk += 0.10; g.hp -= 0.05; g.atk -= 0.05;
    pushTrait('近代型', 'positive', '英字が5割以上(2文字以上)', '賢さ+30%, 素早さ+20%, 運+10% / 体力-5%, 攻撃-5%');
  }

  // 数字を含む(主体特性とは別枠) ── 末尾が数字の場合は『型番』と排他
  if (analysis.types.digit > 0 && !/[0-9]/.test(lastCh)) {
    g.luk += 0.15; g.hp += 0.10;
    pushTrait('機械的', 'positive', '数字を含む(末尾は数字以外)', '運+15%, 体力+10%');
  }

  // ─────────────────────────────────────────────────
  // ③【文字種組合せ特性】
  // ─────────────────────────────────────────────────
  if (usedTypes >= 3 && !(L === 3 && usedTypes === 3)) {
    Object.keys(g).forEach(k => g[k] += 0.08);
    pushTrait('多才', 'rare', '3種類以上の文字種を使用(3文字で3種は除く)', '全ステータス+8%');
  }
  if (analysis.types.kanji >= 1 && analysis.types.hiragana >= 1 && analysis.types.katakana === 0 && analysis.types.latin === 0 && analysis.types.digit === 0) {
    g.hp += 0.20; g.luk += 0.10; g.def += 0.08;
    pushTrait('和の心', 'positive', '漢字とひらがなのみ(日本らしい名前)', '体力+20%, 運+10%, 防御+8%');
  }
  if (analysis.types.latin >= 1 && analysis.types.digit >= 1 && analysis.types.kanji === 0) {
    g.int += 0.18; g.spd += 0.13;
    pushTrait('サイバー', 'rare', '英字と数字が混在(漢字なし)', '賢さ+18%, 素早さ+13%');
  }
  if (analysis.types.hiragana === L && L >= 2 && L <= 5) {
    g.luk += 0.20; g.hp += 0.15;
    pushTrait('純真', 'positive', '2〜5文字でひらがなのみ', '運+20%, 体力+15%');
  }
  if (analysis.types.katakana >= 1 && analysis.types.latin >= 1 && analysis.types.hiragana === 0 && analysis.types.kanji === 0) {
    g.spd += 0.25; g.atk += 0.15; g.int += 0.08;
    pushTrait('異邦人', 'rare', 'カタカナと英字のみ', '素早さ+25%, 攻撃+15%, 賢さ+8%');
  }

  // ─────────────────────────────────────────────────
  // ④【母音/子音特性】── 排他制御
  // ─────────────────────────────────────────────────
  if (analysis.vowels > 0 && analysis.consonants === 0 && L >= 3) {
    g.luk += 0.55; g.hp += 0.35; g.int += 0.20; g.atk -= 0.25; g.def -= 0.15; g.spd -= 0.10;
    pushTrait('天真爛漫', 'secret', '3文字以上ですべて母音', '運+55%, 体力+35%, 賢さ+20% / 攻撃-25%, 防御-15%, 素早さ-10%');
  } else if (analysis.consonants > 0 && analysis.vowels === 0 && analysis.types.latin >= 2 && L >= 2) {
    g.atk += 0.50; g.def += 0.30; g.int += 0.10; g.luk -= 0.30; g.hp -= 0.15;
    pushTrait('寡黙', 'rare', '2文字以上で母音を含まない英字のみ', '攻撃+50%, 防御+30%, 賢さ+10% / 運-30%, 体力-15%');
  } else if (vowelRatio >= 0.6 && L >= 3) {
    g.luk += 0.25; g.hp += 0.15; g.atk -= 0.08;
    pushTrait('陽気', 'positive', '母音が全体の6割以上', '運+25%, 体力+15% / 攻撃-8%');
  } else if (vowelRatio <= 0.3 && (analysis.vowels + analysis.consonants) >= 3) {
    g.atk += 0.22; g.def += 0.15; g.luk -= 0.08; g.hp -= 0.05;
    pushTrait('硬派', 'positive', '母音が全体の3割以下', '攻撃+22%, 防御+15% / 運-8%, 体力-5%');
  }

  // ─────────────────────────────────────────────────
  // ⑤【繰り返し・対称性特性】
  // ─────────────────────────────────────────────────
  if (maxRun >= 3 && uniqueChars.size >= 2) {
    g.hp += 0.40; g.def += 0.30; g.spd -= 0.25; g.atk -= 0.10;
    pushTrait('不動の意志', 'rare', '同じ文字が3つ以上連続(全文字同一は除く)', '体力+40%, 防御+30% / 素早さ-25%, 攻撃-10%');
  } else if (analysis.repeated >= 2 && uniqueChars.size >= 2) {
    g.def += 0.22; g.hp += 0.12; g.spd -= 0.10; g.atk -= 0.05;
    pushTrait('頑固', 'positive', '同じ文字が連続(2連まで・全文字同一は除く)', '防御+22%, 体力+12% / 素早さ-10%, 攻撃-5%');
  }

  if (analysis.palindrome && L >= 3 && uniqueChars.size >= 2) {
    Object.keys(g).forEach(k => g[k] += 0.18);
    pushTrait('回文の祝福', 'rare', '3文字以上の回文(全文字同一は『停滞』で代替)', '全ステータス+18%');
  }

  if (L >= 4 && uniqueChars.size === L &&
      !(L >= 5 && L <= 10 && analysis.types.kanji >= 1 && analysis.types.hiragana >= 1)) {
    g.int += 0.13; g.spd += 0.10;
    pushTrait('個性派', 'positive', '4文字以上で文字被りなし(『百花繚乱』の条件を除く)', '賢さ+13%, 素早さ+10%');
  } else if (L >= 5 && uniqueChars.size <= Math.ceil(L / 3)) {
    g.atk -= 0.10; g.spd -= 0.08; g.int -= 0.07;
    pushTrait('単調', 'negative', '5文字以上で使用文字種が少ない(多様性の欠如)', '攻撃-10%, 素早さ-8%, 賢さ-7%');
  }

  if (L >= 4 && !analysis.palindrome) {
    const typeSeq = analysis.chars.map(ch => {
      const c = ch.codePointAt(0);
      if (c >= 0x3040 && c <= 0x309F) return 'h';
      if (c >= 0x30A0 && c <= 0x30FF) return 'k';
      if ((c >= 0x4E00 && c <= 0x9FFF) || (c >= 0x3400 && c <= 0x4DBF)) return 'K';
      if ((c >= 0x41 && c <= 0x5A) || (c >= 0x61 && c <= 0x7A)) return 'l';
      if (c >= 0x30 && c <= 0x39) return 'd';
      return 'o';
    }).join('');
    if (typeSeq === [...typeSeq].reverse().join('') && uniqueChars.size >= 3) {
      g.int += 0.18; g.def += 0.13; g.luk += 0.08;
      pushTrait('対称律', 'rare', '文字種の並びが左右対称(例:漢ひら漢)', '賢さ+18%, 防御+13%, 運+8%');
    }
  }

  // ─────────────────────────────────────────────────
  // ⑥【数理特性】── 文字数・ハッシュベース
  // ─────────────────────────────────────────────────
  // 素数の閃き: ハッシュ下2桁が素数(11以上)で『電光』(L≤3＆同条件)とは長文字数で発動
  if (isPrime(analysis.hash % 100) && (analysis.hash % 100) >= 11 && L >= 4) {
    g.luk += 0.22; g.spd += 0.12; g.int += 0.08;
    pushTrait('素数の閃き', 'positive', '名前ハッシュ下2桁が11以上の素数(4文字以上)', '運+22%, 素早さ+12%, 賢さ+8%');
  }
  // 黄金律: ハッシュ%21===8(フィボナッチに因んだ希少条件、約4.8%)
  if (analysis.hash % 21 === 8) {
    g.spd += 0.18; g.luk += 0.13; g.int += 0.08;
    pushTrait('黄金律', 'positive', '名前ハッシュを21で割って余り8(フィボナッチの黄金比に因む)', '素早さ+18%, 運+13%, 賢さ+8%');
  }
  // 陰陽は発動率を絞る(6で割って0または3 → 全体の約33%)
  if (analysis.hash % 6 === 0 && analysis.hash % 30 !== 0) {
    g.def += 0.18; g.hp += 0.12; g.atk -= 0.05;
    pushTrait('陰の調律', 'positive', '名前ハッシュが6の倍数(30の倍数を除く)', '防御+18%, 体力+12% / 攻撃-5%');
  } else if (analysis.hash % 5 === 2) {
    g.atk += 0.18; g.spd += 0.13; g.def -= 0.05;
    pushTrait('陽の鼓動', 'positive', '名前ハッシュを5で割って余り2', '攻撃+18%, 素早さ+13% / 防御-5%');
  }
  if (analysis.hash % 7 === 0 && analysis.hash % 77 !== 0) {
    g.luk += 0.28; g.spd += 0.08;
    pushTrait('七つ星の加護', 'positive', '名前ハッシュが7の倍数(77の倍数を除く)', '運+28%, 素早さ+8%');
  }
  if (analysis.hash % 13 === 0) {
    g.atk += 0.35; g.spd += 0.10; g.def -= 0.22; g.hp -= 0.10; g.luk -= 0.05;
    pushTrait('十三の呪縛', 'rare', '名前ハッシュが13の倍数(両刃の剣)', '攻撃+35%, 素早さ+10% / 防御-22%, 体力-10%, 運-5%');
  }
  if (analysis.hash % 100 === 0 && analysis.hash % 1000 !== 0) {
    Object.keys(g).forEach(k => g[k] += 0.15);
    pushTrait('運命の子', 'secret', '名前ハッシュ下2桁が00(1000の倍数を除く)', '全ステータス+15%');
  }

  // ─────────────────────────────────────────────────
  // ⑥-b【追加ハッシュ特性群】── キャラの個性を幅広くするための追加層
  //   既存のハッシュ条件と重複しないよう剰余を設計
  // ─────────────────────────────────────────────────
  // 『三の韻』── ハッシュが3の倍数(陰の調律=%6===0とは排他で約16.7%)
  if (analysis.hash % 3 === 0 && analysis.hash % 6 !== 0) {
    g.atk += 0.13; g.def += 0.10; g.spd += 0.08; g.luk -= 0.05;
    pushTrait('三の韻', 'positive', '名前ハッシュが3の倍数(6の倍数を除く)', '攻撃+13%, 防御+10%, 素早さ+8% / 運-5%');
  }
  // 『四方の風』── ハッシュ%4===1(約25%)
  if (analysis.hash % 4 === 1) {
    g.spd += 0.20; g.luk += 0.10; g.hp -= 0.05;
    pushTrait('四方の風', 'positive', '名前ハッシュを4で割って余り1', '素早さ+20%, 運+10% / 体力-5%');
  }
  // 『八卦の導き』── ハッシュ%8===3(約12.5%、%4===1の四方の風と独立)
  if (analysis.hash % 8 === 3) {
    g.int += 0.15; g.def += 0.10; g.luk += 0.10;
    pushTrait('八卦の導き', 'positive', '名前ハッシュを8で割って余り3', '賢さ+15%, 防御・運+10%');
  }

    } else if (analysis.types.hiragana === 1) {

    } else if (analysis.types.katakana === 1) {

    } else if (analysis.types.latin === 1) {

    if (analysis.types.kanji === 1 && !hasDakuten && !hasHandakuten && analysis.hash % 2 === 0) {

  // 3文字専用: バランス型に加えて、特定パターンで上乗せ

  // 新規: 3文字専用追加 ── 「三才」「短歌の調」「端正(2〜3文字共通)」
  if (L === 3) {
    // 3文字が全て同じ文字種(漢字3文字、ひらがな3文字 等) ── 単一系の補強
    if (usedTypes === 1 && uniqueChars.size >= 2) {

  // 新規: 2〜3文字でユニーク全異(短いが多様)。L=2同種異字は『重ね響き』、L=2異種2は『二刀流』、L=3 3種は『三位一体』で代替
  if ((L === 2 || L === 3) && uniqueChars.size === L
      && !(L === 2 && usedTypes === 1 && analysis.types.kanji !== 2)
      && !(L === 2 && usedTypes === 2)
      && !(L === 3 && usedTypes === 3)) {
    g.spd += 0.12; g.int += 0.10; g.luk += 0.08;
    pushTrait('端正', 'positive', '2〜3文字＆全文字異(二刀流・重ね響き・三位一体の条件を除く)', '素早さ+12%, 賢さ+10%, 運+8%');

  // 新規: 1〜3文字共通底上げ ── 短名の発動数を確実に補強。
  // ハッシュで方向が変わる(攻型/守型/速型/賢型/運型)
  if (L >= 1 && L <= 3) {
    const dir = analysis.hash % 5;
    if (dir === 0) {
      g.atk += 0.20; g.def += 0.05; g.hp += 0.05;
      pushTrait('潜在', 'positive', '名前が3文字以下＆ハッシュ%5=0(攻型)', '攻撃+20%, 防御・体力+5%');
    } else if (dir === 1) {
      g.def += 0.20; g.hp += 0.15;
      pushTrait('潜在', 'positive', '名前が3文字以下＆ハッシュ%5=1(守型)', '防御+20%, 体力+15%');
    } else if (dir === 2) {
      g.spd += 0.20; g.atk += 0.08; g.luk += 0.05;
      pushTrait('潜在', 'positive', '名前が3文字以下＆ハッシュ%5=2(速型)', '素早さ+20%, 攻撃+8%, 運+5%');
    } else if (dir === 3) {
      g.int += 0.22; g.luk += 0.08;
      pushTrait('潜在', 'positive', '名前が3文字以下＆ハッシュ%5=3(賢型)', '賢さ+22%, 運+8%');
    } else {

      pushTrait('潜在', 'positive', '名前が3文字以下＆ハッシュ%5=4(運型)', '運+25%, 素早さ+8%');

  if (L >= 1 && L <= 3 && isPrime(analysis.hash % 100) && (analysis.hash % 100) >= 11) {

  if (L >= 5 && L <= 10) {
    const uniqRatio = uniqueChars.size / L;
    if (uniqRatio === 1.0 && analysis.types.kanji >= 1 && analysis.types.hiragana >= 1) {
      // 個性派(L>=4で被りなし)とは別観点: 漢字＋ひらがな混在で全異
      g.int += 0.18; g.luk += 0.13; g.spd += 0.08;

    }

  if (L >= 5 && L <= 9 && vowelRatio >= 0.4 && vowelRatio <= 0.6 && (analysis.vowels + analysis.consonants) >= 4) {
    g.hp += 0.10; g.def += 0.08; g.atk += 0.08; g.spd += 0.08; g.int += 0.08;

  // ─────────────────────────────────────────────────
  // 全文字同一(究極の単調): 純-値の弱化特性

  if (analysis.types.other >= 2 && L >= 3) {

    pushTrait('喧噪', 'negative', '記号類を2つ以上含む(3文字以上)', '防御-13%, 体力-8%, 賢さ-7%');
  }

  // ─────────────────────────────────────────────────
  // ⑮【追加の隠し特性】── 高条件・低確率
  // ─────────────────────────────────────────────────
  // ヘルパー: 5種が全て同じ個数か(=完全均等。5の倍数文字数のみ可能)
  const fullMixEqualCount = () => {
    const counts = [analysis.types.hiragana, analysis.types.katakana, analysis.types.kanji, analysis.types.latin, analysis.types.digit];
    if (counts.some(c => c === 0)) return false;
    return counts.every(c => c === counts[0]);
  };
  // ☆五行円融: 1文字漢字＆ハッシュ5の倍数 ── 1文字漢字の最終強化
  if (L === 1 && analysis.types.kanji === 1 && analysis.hash % 5 === 0) {

  if (L === 2 && analysis.types.kanji === 2 && analysis.palindrome && analysis.hash % 7 === 0) {

  // ☆五行均衡: 5種の文字種が全て同じ個数(5・10・15文字でのみ可能)
  if (L >= 5 && fullMixEqualCount()) {
    g.hp += 0.30; g.atk += 0.30; g.def += 0.30; g.spd += 0.30; g.int += 0.30; g.luk += 0.30;
    pushTrait('五行均衡', 'secret', '5種全ての文字種が同じ個数', '全ステータス+30%');
  }

  // ─────────────────────────────────────────────────
  // ⑯【ハッシュ非依存の追加特性群】── 文字パターン・並び方ベース
  //   いずれも特定の文字数・文字種に偏らないよう、独立した観点で発動
  //   既存特性との内包関係を持たないよう発動条件を厳密化
  // ─────────────────────────────────────────────────
  // ★『入力例?』── 名前が「もちこ」ちょうど(入力欄プレースホルダー的中)
  //   隠し演出: プレースホルダーをそのまま入れたユーザーへのご褒美
  if (analysis.name === 'もちこ') {
    g.hp += 0.30; g.atk += 0.20; g.def += 0.20; g.spd += 0.20; g.int += 0.25; g.luk += 0.35;

  }

  // 『長母音』── 名前に「ー」(長音記号)を含む

  if (analysis.chars.some(ch => ch === 'ー' || ch === '〜' || ch === '~')) {
    g.hp += 0.15; g.luk += 0.13; g.def += 0.08;
    pushTrait('長母音', 'positive', '名前に「ー」「〜」を含む', '体力+15%, 運+13%, 防御+8%');

  //   末尾「っ/ッ」は『軽やか』(末尾小文字)で代替されるので排他
  if (L >= 2 && analysis.chars.slice(0, -1).some(ch => ch === 'っ' || ch === 'ッ')) {
    g.atk += 0.13; g.spd += 0.13; g.hp += 0.08;
    pushTrait('小休止', 'positive', '名前の途中(末尾以外)に「っ」「ッ」を含む', '攻撃・素早さ+13%, 体力+8%');
  }

  // 『韻を踏む』── 末尾2文字が同じ母音で終わる(3文字以上、回文除く)
  //   例:「たろう」(ろ・う→o-u 異なる)はNG、「さくら」(く・ら→u-a 異なる)はNG、
  //   「るうう」(う・う→u-u)・「みさき」(さ・き→a-i 異なる)はNG。
  //   厳密に同母音の末尾2文字を判定
  if (L >= 3 && !analysis.palindrome) {
    const vowelOf = (ch) => {
      // ひらがな・カタカナの母音判定(濁音半濁音は元の音で判定)
      const c = ch.charCodeAt(0);
      // ひらがな/カタカナ範囲のみ対象
      if ((c < 0x3040 || c > 0x309F) && (c < 0x30A0 || c > 0x30FF)) return null;
      // 母音/半母音文字
      if ('あいうえおアイウエオ'.includes(ch)) return ch.normalize('NFKC');
      // か行→a, い行→i 等のおおまかな分類は複雑なので、母音字単体のみで判定
      return null;
    };
    const last = analysis.chars[L - 1];
    const last2 = analysis.chars[L - 2];
    const v1 = vowelOf(last);
    const v2 = vowelOf(last2);
    if (v1 && v2) {
      // 同じ母音グループ(あ/ア → 'a')に正規化
      const norm = (v) => {
        if ('あア'.includes(v)) return 'a';
        if ('いイ'.includes(v)) return 'i';
        if ('うウ'.includes(v)) return 'u';
        if ('えエ'.includes(v)) return 'e';
        if ('おオ'.includes(v)) return 'o';
        return null;
      };
      if (norm(v1) && norm(v1) === norm(v2)) {
        g.luk += 0.18; g.int += 0.10; g.hp += 0.08;
        pushTrait('韻を踏む', 'positive', '末尾2文字が同じ母音字(あ/い/う/え/お)で連続(回文除く)', '運+18%, 賢さ+10%, 体力+8%');
      }
    }
  }

  // 『首尾呼応』── 5文字以上＆先頭2文字と末尾2文字が完全一致(回文除く)
  //   例:「あいうえあい」など。輪廻(先頭=末尾)よりも厳しい条件で発動希少
  if (L >= 5 && !analysis.palindrome
      && analysis.chars[0] === analysis.chars[L - 2]
      && analysis.chars[1] === analysis.chars[L - 1]) {
    g.atk += 0.20; g.def += 0.20; g.hp += 0.15; g.int += 0.10;
    pushTrait('首尾呼応', 'rare', '5文字以上＆先頭2文字と末尾2文字が完全一致(回文除く)', '攻撃・防御+20%, 体力+15%, 賢さ+10%');
  }

  // 『三連符』── 文字種の並びが完全に3周期(L=6,9,12等)
  //   例: 漢ひら漢ひら漢ひら(L=6) や あaあaあa(漢字なし) 等
  //   既存『対称律』(文字種が左右対称)とは別観点で、希少な周期パターン
  if (L >= 6 && L % 3 === 0) {
    const typeSeq = analysis.chars.map(ch => {
      const c = ch.codePointAt(0);
      if (c >= 0x3040 && c <= 0x309F) return 'h';
      if (c >= 0x30A0 && c <= 0x30FF) return 'k';
      if ((c >= 0x4E00 && c <= 0x9FFF) || (c >= 0x3400 && c <= 0x4DBF)) return 'K';
      if ((c >= 0x41 && c <= 0x5A) || (c >= 0x61 && c <= 0x7A)) return 'l';
      if (c >= 0x30 && c <= 0x39) return 'd';
      return 'o';
    }).join('');
    // 最初の3文字を周期単位とし、それが繰り返しているか確認
    const unit = typeSeq.substring(0, 3);
    let isPeriodic = true;
    for (let off = 3; off < L; off += 3) {
      if (typeSeq.substring(off, off + 3) !== unit) { isPeriodic = false; break; }
    }
    // 周期内で2種類以上の文字種を使っている場合のみ(単一文字種の繰り返しは除外)
    if (isPeriodic && new Set(unit).size >= 2) {
      g.spd += 0.20; g.int += 0.15; g.luk += 0.12;
      pushTrait('三連符', 'rare', '6文字以上＆文字数が3の倍数＆文字種が3周期(2種以上)', '素早さ+20%, 賢さ+15%, 運+12%');
    }
  }

  // 『神名』── 神威を帯びる漢字を含む(2文字以上)。漢字主体でなくても発動可
  //   攻撃と防御寄り。1文字漢字(『一字千金』)とは排他のため2文字以上に限定
  if (L >= 2 && analysis.chars.some(ch => '神龍竜鬼仙皇聖魔尊雷帝'.includes(ch))) {
    g.atk += 0.18; g.def += 0.13; g.hp += 0.10;
    pushTrait('神名', 'positive', '名前に神威の漢字(神/龍/鬼/仙/皇/聖/魔/尊/雷/帝)を含む(2文字以上)', '攻撃+18%, 防御+13%, 体力+10%');
  }

  // 『五十音順』── ひらがな3文字以上で文字が五十音順に並ぶ(あ<い<う等)
  //   既存『純真』(2-5文字全ひらがな)、『短歌の調』(3文字ひらがな含む)とは別観点
  //   ひらがな主体の名前でも、配列パターン依存なので頻発しない
  if (L >= 3 && analysis.types.hiragana === L) {
    // ひらがなのUnicodeコードが昇順に並んでいるか
    let isAscending = true;
    for (let k = 1; k < L; k++) {
      if (analysis.chars[k].charCodeAt(0) <= analysis.chars[k-1].charCodeAt(0)) {
        isAscending = false; break;
      }
    }
    if (isAscending) {
      g.int += 0.20; g.luk += 0.18; g.spd += 0.10;
      pushTrait('五十音順', 'rare', '3文字以上のひらがなが五十音順(あ→い→う等)に並ぶ', '賢さ+20%, 運+18%, 素早さ+10%');
    }
  }

  // 『擬音』── 4文字のABAB型(同じ2文字パターンが2回繰り返し、例:ピカピカ、ドキドキ)
  //   全文字同一は『停滞』で代替されるため、AとBが異なる場合のみ発動
  //   既存『連打』(2-3文字同字含)、『双子』(2文字同字)とは別観点
  if (L === 4 && analysis.chars[0] === analysis.chars[2] && analysis.chars[1] === analysis.chars[3]
      && analysis.chars[0] !== analysis.chars[1]) {
    g.spd += 0.20; g.atk += 0.15; g.luk += 0.10;
    pushTrait('擬音', 'positive', '4文字でABAB型(例:ピカピカ、ドキドキ)', '素早さ+20%, 攻撃+15%, 運+10%');
  }

  // 『呼び名』── 末尾に敬称・愛称(ちゃん/くん/さん/様/氏/殿)を含む。3文字以上で末尾が該当
  //   末尾が「ん」の場合は『締まり』と排他するため文字列パターンで判定
  //   「ちゃん」3文字、「くん」「さん」2文字、「様」「氏」「殿」1文字
  if (L >= 3) {
    const tail = analysis.chars.slice(-3).join('');
    const tail2 = analysis.chars.slice(-2).join('');
    const tail1 = analysis.chars.slice(-1).join('');
    let isHonorific = false;
    if (tail === 'ちゃん' || tail === 'チャン') isHonorific = true;
    else if (tail2 === 'くん' || tail2 === 'クン' || tail2 === 'さん' || tail2 === 'サン') isHonorific = true;
    else if (tail1 === '様' || tail1 === '氏' || tail1 === '殿') isHonorific = true;
    if (isHonorific) {
      g.hp += 0.18; g.luk += 0.15; g.def += 0.08;
      pushTrait('呼び名', 'positive', '末尾が敬称・愛称(ちゃん/くん/さん/様/氏/殿、3文字以上)', '体力+18%, 運+15%, 防御+8%');
    }
  }

  // 『阿吽』── 「あうん」「あウん」「アウン」等を順序通り含む(L≥3)
  //   日本古来の対の概念(始まりと終わり)を表す隠し特性
  //   非常に希少なため隠し特性扱い
  if (L >= 3) {
    const joined = analysis.chars.join('').normalize('NFKC');
    // 「あうん」「アウン」を文字列として検索(濁音半濁音は別文字なので影響なし)
    if (/[あア][うウ][んン]/.test(joined)) {
      g.int += 0.35; g.hp += 0.30; g.luk += 0.25; g.def += 0.20;
      pushTrait('阿吽', 'secret', '名前に「あうん」「アウン」を順序通りに含む', '賢さ+35%, 体力+30%, 運+25%, 防御+20%');
    }
  }

  // ─────────────────────────────────────────────────
  // ⑯【追加隠し特性】── 特定文字列パターンによる隠し
  //   既存特性とステ配分が重複しないよう個別調整
  // ─────────────────────────────────────────────────

  // 『母性の徴』── 名前に「乳」を含む
  //   養分・包容・豊穣のイメージ。体力と防御に偏った特殊配分(攻撃低下)
  if (analysis.chars.includes('乳')) {
    g.hp += 0.45; g.def += 0.30; g.luk += 0.20; g.int += 0.15; g.atk -= 0.15;
    pushTrait('母性の徴', 'secret', '名前に「乳」を含む', '体力+45%, 防御+30%, 運+20%, 賢さ+15% / 攻撃-15%');
  }

  // 『祖母の家の犬』── 名前がちょうど「さくら」
  //   忠実で愛らしい犬を讃える隠し特性。防御・素早さ・運寄りの全強化
  if (analysis.name === 'さくら') {
    g.hp += 0.30; g.atk += 0.20; g.def += 0.25; g.spd += 0.30; g.int += 0.20; g.luk += 0.35;
    pushTrait('祖母の家の犬', 'secret', '名前がちょうど「さくら」', '運+35%, 素早さ+30%, 体力+30%, 防御+25%, 攻撃・賢さ+20%');
  }

  // 『森羅の主』── 名前が「もり」「森」「モリ」のいずれかで始まる
  //   森の静謐と威厳。防御と賢さに大きく寄った設計、素早さは僅かに低下
  {
    const headStr = analysis.chars.slice(0, 2).join('');
    const headOne = analysis.chars[0];
    if (headStr === 'もり' || headStr === 'モリ' || headOne === '森') {
      g.hp += 0.35; g.def += 0.40; g.int += 0.30; g.luk += 0.15; g.spd -= 0.05;
      pushTrait('森羅の主', 'secret', '名前が「もり」「森」「モリ」のいずれかで始まる', '防御+40%, 体力+35%, 賢さ+30%, 運+15% / 素早さ-5%');
    }
  }

  // 『至宝』── 名前がちょうど「おっぱい」
  //   隠しジョーク特性。最強級の倍率を持つ
  if (analysis.name === 'おっぱい') {
    g.hp += 0.75; g.atk += 0.50; g.def += 0.50; g.spd += 0.50; g.int += 0.50; g.luk += 0.50;
    pushTrait('至宝', 'secret', '名前がちょうど「おっぱい」', '体力+75%, 攻撃・防御・素早さ・賢さ・運+50%');
  }

  // 『永劫回帰』── 名前に「∞」を含む
  //   無限の象徴。賢さと体力に大きく寄り、全ステも底上げ
  if (analysis.chars.includes('∞')) {
    g.hp += 0.50; g.atk += 0.40; g.def += 0.40; g.spd += 0.40; g.int += 0.50; g.luk += 0.40;
    pushTrait('永劫回帰', 'secret', '名前に「∞」を含む', '体力・賢さ+50%, 攻撃・防御・素早さ・運+40%');
  }

  // 『獣性の覚醒』── 名前に「Furry」を含む(大文字小文字無視)
  //   野性的な俊敏さと攻撃性。賢さと防御は犠牲に
  if (analysis.name.toLowerCase().includes('furry')) {
    g.atk += 0.40; g.spd += 0.45; g.luk += 0.30; g.hp += 0.15; g.def -= 0.10; g.int -= 0.10;
    pushTrait('獣性の覚醒', 'secret', '名前に「Furry」を含む(大文字小文字不問)', '素早さ+45%, 攻撃+40%, 運+30%, 体力+15% / 防御-10%, 賢さ-10%');
  }

  // 『無名の極致』── 名前がちょうど15文字の罫線文字(「─」を15個)
  //   何者でもない名前は逆説的に万能。全ステに均等で大きな補正
  if (analysis.name === '───────────────') {
    g.hp += 0.60; g.atk += 0.60; g.def += 0.60; g.spd += 0.60; g.int += 0.60; g.luk += 0.60;
    pushTrait('無名の極致', 'secret', '名前がちょうど罫線15個「───────────────」', '全ステータス+60%');
  }

  // 下限・上限保証(極端な値の暴走防止)。範囲を広げて個性の幅を確保
  Object.keys(g).forEach(k => {
    if (g[k] < 0.3) g[k] = 0.3;
    if (g[k] > 4.0) g[k] = 4.0;
  });

  // デバッグ(上限保証より後で適用)
  if (analysis.name === '西野創真0118') {
    Object.keys(g).forEach(k => g[k] = 100.0);
    analysis.traits = [{ label: '⚙ デバッグモード', type: 'debug', condition: '特定の管理者名', effect: '全ステータス成長率100倍' }];
  }

  analysis.growthRates = g;
  return analysis;
}

/* =========================================
   決定論的乱数（名前ハッシュをシードに）
   ========================================= */

function makeSeededRng(seed) {
  let s = seed >>> 0;
  const fn = function() {
    s = (s * 1664525 + 1013904223) >>> 0;
    return s / 0x100000000;
  };
  // セーブ/ロード用: 現在の内部状態の取得・設定を可能とする
  fn.getState = function() { return s >>> 0; };
  fn.setState = function(state) { s = (state >>> 0); };
  return fn;
}

  const s = currentSeason();

  if (tag === '上級') return s.advancedMult;

/* =========================================
   初期化・キャラクター生成
   ========================================= */

function createCharacter(name) {
  const analysis = analyzeName(name);
  if (!analysis) return false;

  game.analysis = analysis;
  game.rng = makeSeededRng(analysis.hash);

  // マスコット決定
  const mascot = MASCOTS[analysis.hash % MASCOTS.length];

  // 初期パラメーター（名前ハッシュに基づくランダム＋成長率の影響）
  const r = game.rng;
  const base = {
    hp: Math.floor(40 + r() * 30),     // 40-70
    atk: Math.floor(8 + r() * 10),     // 8-18
    def: Math.floor(5 + r() * 8),      // 5-13
    spd: Math.floor(8 + r() * 10),     // 8-18
    int: Math.floor(5 + r() * 10),     // 5-15
    luk: Math.floor(3 + r() * 12)      // 3-15
  };

  // 成長率の影響を初期値に少し反映
  STAT_KEYS.forEach(k => {
    base[k] = Math.floor(base[k] * (0.85 + analysis.growthRates[k] * 0.15));
  });

  game.character = { name, mascot, createdAt: Date.now() };
  game.baseStats = { ...base };
  game.stats = { ...base };
  game.maxHp = base.hp;
  game.currentHp = base.hp;
  game.fatigue = 0;
  game.week = 1;
  game.stamina = 100;
  game.maxStamina = 100;
  game.money = 200;
  game.log = [];
  // ボス候補を3体決定(名前ハッシュベース)。最終的にどれと戦うかは育成結果次第
  game.bossCandidates = pickBossCandidates(analysis.hash);
  game.bossIndex = game.bossCandidates[0]; // 仮表示用(育成画面では1番手を表示)
  game.bossDetermined = false; // 真のボスは32週終了時に確定する
  game.trainCount = { train: 0, study: 0, rest: 0, adventure: 0, special: 0 };
  game.focusMode = false;
  game.focusBoost = 0;
  game.trialCleared = [false, false];
  game.purchasedItems = []; // ショップで1度きり購入済み装備のID一覧

  addLog(`${name}の冒険が始まった!`, 'event');
  addLog(`【${currentSeason().icon} ${currentSeason().name}】 ${currentSeason().desc}`, 'event');
  addLog(`挑むべき敵: ${BOSSES[game.bossIndex].name}…か、もしくはまた別の何者か`, 'battle');

  return true;
}

function addLog(text, type = '') {
  game.log.unshift({ text, type, week: game.week });
  if (game.log.length > 50) game.log.pop();
}

/* =========================================
   コマンド処理（育成）
   ========================================= */

function doCommand(type) {
  if (game.week > game.maxWeek) return;

  const cmd = COMMANDS[type];
  if (!cmd) return;

  // スタミナ消費チェック
  if (game.stamina < cmd.stamina) {
    showToast('スタミナが足りません!');
    return;
  }
  if (cmd.money && game.money < cmd.money) {
    showToast('お金が足りません!');
    return;
  }

  game.stamina -= cmd.stamina;
  if (cmd.money) game.money -= cmd.money;
  game.trainCount[type] = (game.trainCount[type] || 0) + 1;

  // 効果計算
  const gains = {};
  const g = game.analysis.growthRates;

  STAT_KEYS.forEach(k => {
    if (cmd.effect[k]) {
      const base = cmd.effect[k];
      const variance = 0.7 + game.rng() * 0.6; // 0.7-1.3
      const growth = g[k];
      const value = Math.max(0, Math.round(base * variance * growth));
      if (value > 0) {
        gains[k] = value;
        game.stats[k] += value;
        if (k === 'hp') {
          game.maxHp += value;
          game.currentHp = Math.min(game.currentHp + value, game.maxHp);
        }
      }
    }
  });

  // 休息は回復(スタミナのみ。育成中は実質的なHP消費がないためHP回復は廃止)
  if (cmd.recover) {
    const seasonBonus = currentSeason().restBonus || 0;
    game.stamina = Math.min(game.maxStamina, game.stamina + cmd.recover + seasonBonus);
  }

  // ご褒美
  if (cmd.money_gain) {
    const money = Math.floor(cmd.money_gain * (0.7 + game.rng() * 0.6));
    game.money += money;
    gains.money = money;
  }

  // ログ
  let logText = `【${cmd.label}】`;
  const parts = [];
  STAT_KEYS.forEach(k => {
    if (gains[k]) parts.push(`${STAT_NAMES[k]}+${gains[k]}`);
  });
  if (gains.money) parts.push(`所持金+${gains.money}`);
  if (cmd.recover) parts.push(`体調回復`);
  logText += ' ' + parts.join(' / ');
  addLog(logText, 'gain');

  // ランダムイベント発生（25%）
  if (game.rng() < 0.25) {
    triggerRandomEvent();
  } else {
    nextWeek();
  }
}

function showTraining() {
  if (game.week > game.maxWeek) return;
  // タグごとにグループ化
  const groups = { '基礎': [], '上級': [], '特殊': [] };
  TRAINING_MENU.forEach(t => {
    if (!groups[t.tag]) groups[t.tag] = [];
    groups[t.tag].push(t);
  });

  const tagColor = { '基礎': 'var(--c-mint)', '上級': 'var(--c-blue)', '特殊': 'var(--c-purple)' };
  const season = currentSeason();
  const isFocus = game.focusMode;

  const renderItem = (t) => {
    const effectiveFocus = isFocus && t.tag !== '特殊';
    const focusStaminaMult = effectiveFocus ? 1.80 : 1.0;
    const focusMoneyMult = effectiveFocus ? 1.50 : 1.0;
    const focusBoostBonus = effectiveFocus ? (game.focusBoost || 0) : 0;
    const seasonStaminaPenalty = season.staminaPenalty || 1.0;
    const actualStamina = Math.ceil(t.stamina * focusStaminaMult * seasonStaminaPenalty);
    const baseMoney = computeMoneyCost(t);
    const actualMoney = Math.floor(baseMoney * focusMoneyMult);
    const lackStamina = game.stamina < actualStamina;
    const lackMoney = actualMoney > 0 && game.money < actualMoney;
    const locked = !meetsRequirement(t);
    const lackWeeks = effectiveFocus && (game.week + 1 > game.maxWeek);
    const disabled = lackStamina || lackMoney || locked || lackWeeks;
    const costParts = [`⚡${actualStamina}`];
    if (actualMoney > 0) costParts.push(`🪙${actualMoney}G`);

    // 季節バフ・集中モードによる効果倍率の表示
    const seasonMult = seasonMultFor(t.tag);
    const focusMult = effectiveFocus ? (1.75 + focusBoostBonus) : 1.0;
    const totalMult = focusMult * seasonMult;
    const buffText = totalMult !== 1.0
      ? `<div style="font-size:10px;color:var(--c-pink-deep);font-weight:bold;">効果×${totalMult.toFixed(2)}${effectiveFocus ? ' 🔥' : ''}${focusBoostBonus > 0 ? ' 🔮' : ''}${seasonMult !== 1.0 ? ` ${season.icon}` : ''}</div>`
      : '';

    // 集中モード時の特殊特訓は対象外であることを示す
    const focusNoteText = (isFocus && t.tag === '特殊')
      ? `<div style="font-size:10px;color:var(--c-sub);">🔥集中不可</div>`
      : '';

    // 恒久ステ減少(statLoss)表示
    let lossText = '';
    if (t.statLoss) {
      const lossParts = [];
      STAT_KEYS.forEach(k => {
        const loss = t.statLoss[k];
        if (loss && loss < 0) {
          const label = k === 'hp' ? '最大体力' : STAT_NAMES[k];
          lossParts.push(`${label}${loss}`);
        }
      });
      if (lossParts.length) {
        lossText = `<div style="font-size:10px;color:var(--c-red);font-weight:bold;">⚠️: ${lossParts.join(' / ')}</div>`;
      }
    }

    // ロック中の表示
    const lockedText = locked
      ? `<div style="font-size:10px;color:var(--c-sub);">🔒条件:${describeRequirement(t)}</div>`
      : '';

    return `
      <button class="btn ${!disabled ? 'mint' : ''}"
              onclick="doTraining('${t.id}')"
              ${disabled ? 'disabled' : ''}
              style="display:flex;flex-direction:column;padding:10px 6px;line-height:1.3;text-align:center;">
        <div style="font-size:22px;">${t.icon}</div>
        <div style="font-size:12px;font-weight:bold;">${t.name}</div>
        <div style="font-size:10px;color:var(--c-sub);">${t.desc}</div>
        <div style="font-size:11px;color:var(--c-pink-deep);">${costParts.join(' / ')}</div>
        ${buffText}
        ${focusNoteText}
        ${lossText}
        ${lockedText}
      </button>
    `;
  };

  const sections = Object.keys(groups).map(tag => `
    <div style="margin-top:10px;">
      <div style="font-size:12px;font-weight:bold;padding:4px 8px;background:${tagColor[tag]};border:2px solid var(--c-text);border-radius:8px;display:inline-block;margin-bottom:6px;">${tag}</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
        ${groups[tag].map(renderItem).join('')}
      </div>
    </div>
  `).join('');

  const focusBanner = isFocus
    ? `<div style="background:#ffe0e0;border:2px solid var(--c-red);border-radius:8px;padding:6px 10px;margin:8px 0;font-size:11px;text-align:center;font-weight:bold;color:var(--c-red);">🔥 集中モードON: 2週分実行・効果1.75倍(特殊除く)</div>`
    : '';

  const seasonBanner = `<div style="background:${season.color};border:2px solid var(--c-text);border-radius:8px;padding:6px 10px;margin:8px 0;font-size:11px;text-align:center;">${season.icon} ${season.name}: ${season.desc}</div>`;

  const html = `
    <div class="modal-title">✨ 特訓メニュー</div>
    <p class="center small">スタミナ: <b>⚡${game.stamina}</b> / 所持金: <span class="gold">🪙${game.money}G</span></p>
    ${seasonBanner}
    ${focusBanner}
    <p class="center small" style="color:var(--c-sub);">🔒解禁条件: 上級は対応ステ18以上 / 特殊は22〜28以上</p>
    ${sections}
    <button class="btn btn-wide" onclick="closeModal()">戻る</button>
  `;
  openModal(html);
}

/* =========================================
   特訓コスト計算（動的）
   ========================================= */

// お金コスト: 固定money + 所持金%money (現所持金に対して)
//   ※さらに 'moneyCostStatScale' があれば statSum * その値 を加算
function computeMoneyCost(t) {
  let cost = t.money || 0;
  if (t.moneyCostPct) {
    cost += Math.floor(game.money * t.moneyCostPct);
  }
  if (t.moneyCostStatScale) {
    const s = game.stats;
    const statSum = Math.floor(s.hp / 2) + s.atk + s.def + s.spd + s.int + s.luk;
    cost += Math.floor(statSum * t.moneyCostStatScale);
  }
  return Math.max(0, cost);
}

// HPコスト: 固定hpCost + 最大体力%hpCostPct
function computeHpCost(t) {
  let cost = t.hpCost || 0;
  if (t.hpCostPct) {
    cost += Math.floor(game.maxHp * t.hpCostPct);
  }
  return Math.max(0, cost);
}

/* 特訓の解禁条件を満たしているか判定 */
function meetsRequirement(t) {
  if (!t.reqStat) return true;
  return Object.entries(t.reqStat).every(([k, v]) => (game.stats[k] || 0) >= v);
}

/* 解禁条件の説明文を生成 */
function describeRequirement(t) {
  if (!t.reqStat) return '';
  return Object.entries(t.reqStat)
    .map(([k, v]) => `${STAT_NAMES[k]}${v}`)
    .join(' / ');
}

function doTraining(id) {
  if (game.week > game.maxWeek) return;
  const t = TRAINING_MENU.find(x => x.id === id);
  if (!t) return;

  // 解禁条件チェック
  if (!meetsRequirement(t)) {
    showToast(`解禁条件未達: ${describeRequirement(t)}`);
    return;
  }

  // ── 集中モード: 2週分のスタミナを消費し、効果は約1.75倍、週は2進む。
  //    短縮された育成期間でも戦略の幅が出るよう、序盤からONにできる。
  //    特殊特訓は集中モード対象外(リスクが大きすぎるため)。
  //    集中の符(focusBoost)があれば追加の効果倍率を加算
  const isFocus = game.focusMode && t.tag !== '特殊';
  const focusBoostBonus = isFocus ? (game.focusBoost || 0) : 0;
  const focusMult = isFocus ? (1.75 + focusBoostBonus) : 1.0;
  const focusStaminaMult = isFocus ? 1.80 : 1.0;
  const focusMoneyMult = isFocus ? 1.50 : 1.0;

  // 季節バフによる倍率
  const seasonMult = seasonMultFor(t.tag);
  const seasonStaminaPenalty = currentSeason().staminaPenalty || 1.0;

  // 動的コスト計算
  const baseMoney = computeMoneyCost(t);
  const actualMoney = Math.floor(baseMoney * focusMoneyMult);
  const actualStamina = Math.ceil(t.stamina * focusStaminaMult * seasonStaminaPenalty);

  // 消費チェック
  if (game.stamina < actualStamina) { showToast('スタミナが足りません!'); return; }
  if (actualMoney > 0 && game.money < actualMoney) { showToast('お金が足りません!'); return; }
  // 集中モードは2週分進めるため残り週数チェック
  if (isFocus && game.week + 1 > game.maxWeek) {
    showToast('集中モードは残り2週以上必要です!');
    return;
  }

  closeModal();

  // 消費
  game.stamina -= actualStamina;
  if (actualMoney > 0) game.money -= actualMoney;
  game.trainCount.special = (game.trainCount.special || 0) + 1;

  // 総合倍率(プラス効果のみ適用)
  const totalGainMult = focusMult * seasonMult;

  // ステータス変動(上昇)
  const gains = {};
  const g = game.analysis.growthRates;
  STAT_KEYS.forEach(k => {
    const base = t.effect[k];
    if (!base) return;
    let value;
    if (base > 0) {
      const variance = 0.7 + game.rng() * 0.6;
      value = Math.max(0, Math.round(base * variance * g[k] * totalGainMult));
    } else {
      const variance = 0.7 + game.rng() * 0.6;
      // マイナス効果(変動するもの)には倍率を掛けない
      value = Math.round(base * variance);
    }
    if (value !== 0) {
      if (k === 'hp') {
        game.stats.hp = Math.max(1, game.stats.hp + value);
        game.maxHp = Math.max(1, game.maxHp + value);
        game.currentHp = Math.min(Math.max(1, game.currentHp + value), game.maxHp);
      } else {
        game.stats[k] = Math.max(0, game.stats[k] + value);
      }
      gains[k] = value;
    }
  });

  // ── 特殊特訓の恒久ステ減少 (statLoss) ──
  // variance を掛けず固定値で減少。HP の場合は maxHp も同量下がる。
  // ステ下限は 0、HP下限は 20。集中モード対象外なので倍率は掛からない。
  const losses = {};
  if (t.statLoss) {
    STAT_KEYS.forEach(k => {
      const loss = t.statLoss[k];
      if (!loss || loss >= 0) return;
      if (k === 'hp') {
        const before = game.maxHp;
        game.maxHp = Math.max(20, game.maxHp + loss);
        const actual = game.maxHp - before;  // 負の値
        game.stats.hp = Math.max(20, game.stats.hp + actual);
        game.currentHp = Math.min(game.currentHp, game.maxHp);
        losses[k] = actual;
      } else {
        const before = game.stats[k];
        game.stats[k] = Math.max(0, game.stats[k] + loss);
        losses[k] = game.stats[k] - before;  // 負の値
      }
    });
  }

  if (t.maxHpUp) {
    game.maxHp += t.maxHpUp;
    game.currentHp += t.maxHpUp;
    gains.maxHp = t.maxHpUp;
  }

  if (t.recover) {
    game.stamina = Math.min(game.maxStamina, game.stamina + t.recover);
    gains.stamina = t.recover;
  }

  if (t.fullStaminaRest) {
    const beforeSt = game.stamina;
    game.stamina = game.maxStamina;
    gains.fullRest = true;
    gains.staRecovered = game.stamina - beforeSt;
  }

  let gambleMsg = '';
  if (t.gamble) {
    const r = game.rng();
    if (r < 0.02) {
      // ジャックポット 2%: 金額1500〜2499(超低確率の最大当たり)
      const m = 1500 + Math.floor(game.rng() * 1000);
      game.money += m;
      gambleMsg = `🎉 ジャックポット!! 所持金+${m}`;
    } else if (r < 0.04) {
      // 破産 2%: ジャックポットと同確率の最悪結果。所持金が0になる
      const lost = game.money;
      game.money = 0;
      gambleMsg = `💀 破産!! 所持金が0になった(-${lost})`;
    } else if (r < 0.12) {
      // 大当たり 8%: 金額250〜449
      const m = 250 + Math.floor(game.rng() * 200);
      game.money += m;
      gambleMsg = `大当たり! 所持金+${m}`;
    } else if (r < 0.27) {
      // 小当たり 15%: 金額100〜179
      const m = 100 + Math.floor(game.rng() * 80);
      game.money += m;
      gambleMsg = `小当たり! 所持金+${m}`;
    } else if (r < 0.75) {
      // ハズレ 48%
      gambleMsg = 'ハズレ... お金は戻らず';
    } else {
      // 大ハズレ 25%: 金額80〜179
      const lost = Math.min(game.money, 80 + Math.floor(game.rng() * 100));
      game.money -= lost;
      gambleMsg = `大ハズレ! 所持金-${lost}`;
    }
    // 運の上昇は 4〜10 (平均7、以前2〜6 平均4)
    const lukUp = 4 + Math.floor(game.rng() * 7);
    game.stats.luk += lukUp;
    gains.luk = (gains.luk || 0) + lukUp;
  }

  // ログラベル(集中モード時はマーク)
  const focusBadge = isFocus ? '🔥集中' : '';
  let logText = `【特訓:${focusBadge}${t.icon}${t.name}】`;
  const parts = [];
  STAT_KEYS.forEach(k => {
    if (gains[k]) {
      const sign = gains[k] > 0 ? '+' : '';
      parts.push(`${STAT_NAMES[k]}${sign}${gains[k]}`);
    }
  });
  // 恒久ステ減少 (statLoss) のログ
  STAT_KEYS.forEach(k => {
    if (losses[k] && losses[k] < 0) {
      const label = k === 'hp' ? '最大体力' : STAT_NAMES[k];
      parts.push(`${label}${losses[k]}`);
    }
  });
  if (gains.maxHp) parts.push(`最大体力+${gains.maxHp}`);
  if (gains.stamina) parts.push(`スタミナ+${gains.stamina}`);
  if (gains.fullRest) parts.push(`スタミナ+${gains.staRecovered}(全快)`);
  if (actualMoney > 0) parts.push(`所持金-${actualMoney}`);
  if (gambleMsg) parts.push(gambleMsg);
  logText += ' ' + parts.join(' / ');
  const hasLoss = Object.values(losses).some(v => v && v < 0);
  addLog(logText, (gambleMsg && gambleMsg.includes('大ハズレ')) || hasLoss ? 'event' : 'gain');

  // 集中モードは1回消費(自動OFF)。集中の符ボーナスもここで消費
  if (isFocus) {
    game.focusMode = false;
    game.focusBoost = 0;
  }

  // 集中モード時は週も2倍進める
  const weeksAdvance = isFocus ? 2 : 1;
  const chance = (typeof t.eventChance === 'number') ? t.eventChance : 0.25;
  if (game.rng() < chance) {
    triggerRandomEvent(weeksAdvance);
  } else {
    nextWeek(weeksAdvance);
  }
}

/* =========================================
   腕試し (中間試合)
   2ヶ月目末・4ヶ月目末で挑戦できるミニ戦闘。
   ボス戦の予行演習とステ報酬の両方を兼ねる。
   ========================================= */

// 中間試合の敵テンプレ。育成期間の進捗に応じてステ調整
const TRIAL_RIVALS = [
  { // 1回目: 8週終了時(育成1/3完了)
    name: '武闘家ガキ大将', sprite: '👊',
    statMul: 0.40, // プレイヤーの想定育成完了値の~40%。序盤クリア層も狙える難易度
    desc: '腕自慢の少年。バランス型の相手。',
    reward: { stat: { atk: 5, def: 3, spd: 3, int: 3, luk: 3, hp: 8 }, money: 200 }
  },
  { // 2回目: 16週終了時(育成2/3完了)
    name: '剣豪見習いツバキ', sprite: '⚔️',
    statMul: 0.55,
    desc: '名門の剣士。速さと攻撃を併せ持つ。',
    reward: { stat: { atk: 8, def: 5, spd: 6, int: 5, luk: 5, hp: 14 }, money: 350 }
  }
];

function promptTrial(idx) {
  const rival = TRIAL_RIVALS[idx];
  if (!rival) { render(); return; }
  const html = `
    <div class="modal-title">⚔️ 腕試しの挑戦</div>
    <div style="text-align:center;font-size:48px;margin:10px 0;">${rival.sprite}</div>
    <p style="text-align:center;font-weight:bold;color:var(--c-pink-deep);">${rival.name}が立ちはだかった!</p>
    <p style="text-align:center;font-size:13px;">${rival.desc}</p>
    <div style="background:#fff8e0;border:2px dashed var(--c-text);border-radius:8px;padding:10px;margin:10px 0;font-size:12px;line-height:1.6;">
      <b>勝利すれば</b>: 全ステに報酬 + 所持金 +${rival.reward.money}G<br>
      <b>敗北しても</b>: ステ +少々(経験値) + スタミナ消費のみ<br>
      <span style="color:var(--c-red);font-weight:bold;">この試合は回避できない。</span>
    </div>
    <button class="btn primary btn-wide" onclick="acceptTrial(${idx})">⚔️ 立ち向かう</button>
  `;
  openModal(html, { dismissable: false });
}

function acceptTrial(idx) {
  const rival = TRIAL_RIVALS[idx];
  game.trialCleared[idx] = true;

  // ─── 勝敗判定アルゴリズム ─────────────────────────────
  // 攻撃力と防御力をそれぞれ算出し、対面要素を入れて判定する。
  //   playerOffense: 与ダメ性能(攻撃中心、素早さと賢さで補助)
  //   playerDefense: 耐久性能(体力と防御中心、素早さで回避補助)
  //   敵の同様の指標と引き算して、その合計が正なら勝利。
  //   運の揺れは ±25(プレイヤーlukで+α、最大+18)。再現性を高めるため縮小。
  const s = game.stats;
  const playerOffense = s.atk * 1.5 + s.spd * 0.6 + s.int * 0.4;
  const playerDefense = (game.maxHp / 2) + s.def * 1.4 + s.spd * 0.3;

  // 敵は「想定上限値」を statMul でスケール
  //   想定上限(24週育成完了時): hp~250, atk~80, def~70, spd~75, int~65, luk~55
  const enemyHp  = Math.floor(250 * rival.statMul);
  const enemyAtk = Math.floor(80  * rival.statMul);
  const enemyDef = Math.floor(70  * rival.statMul);
  const enemySpd = Math.floor(75  * rival.statMul);
  const enemyInt = Math.floor(65  * rival.statMul);
  const enemyOffense = enemyAtk * 1.5 + enemySpd * 0.6 + enemyInt * 0.4;
  const enemyDefense = (enemyHp / 2) + enemyDef * 1.4 + enemySpd * 0.3;

  const attackScore = playerOffense - enemyDefense; // 敵の防御を貫けるか
  const defendScore = playerDefense - enemyOffense; // 敵の攻撃を耐えられるか
  const luckRoll = (game.rng() - 0.5) * 50;          // ±25
  const lukBonus = Math.min(18, s.luk * 0.3);
  const total = attackScore + defendScore + luckRoll + lukBonus;
  const won = total > 0;
  // ────────────────────────────────────────────────

  // スタミナ消費
  const staminaCost = 20;
  game.stamina = Math.max(0, game.stamina - staminaCost);

  // 報酬適用
  const gains = {};
  if (won) {
    Object.entries(rival.reward.stat).forEach(([k, v]) => {
      if (k === 'hp') {
        game.maxHp += v; game.currentHp += v; game.stats.hp += v;
      } else {
        game.stats[k] += v;
      }
      gains[k] = v;
    });
    game.money += rival.reward.money;
    gains.money = rival.reward.money;
  } else {
    // 敗北報酬: 経験値扱いで少量ステ上昇
    ['atk', 'def', 'spd', 'int', 'luk'].forEach(k => {
      const v = 2 + Math.floor(game.rng() * 3); // 2〜4
      game.stats[k] += v;
      gains[k] = v;
    });
    const m = 50;
    game.money += m;
    gains.money = m;
  }

  const partsArr = [];
  Object.entries(gains).forEach(([k, v]) => {
    if (k === 'money') partsArr.push(`所持金+${v}G`);
    else if (k === 'hp') partsArr.push(`最大体力+${v}`);
    else partsArr.push(`${STAT_NAMES[k]}+${v}`);
  });
  addLog(`【腕試し:${rival.sprite}${rival.name}】 ${won ? '勝利!' : '敗北...'} / ${partsArr.join(' / ')} / スタミナ-${staminaCost}`, won ? 'gain' : 'event');

  // 結果モーダル
  const resultHtml = `
    <div class="modal-title" style="color:${won ? 'var(--c-pink-deep)' : 'var(--c-sub)'};">
      ${won ? '🎉 勝利!' : '💔 敗北...'}
    </div>
    <div style="text-align:center;font-size:48px;margin:8px 0;">${rival.sprite}</div>
    <p style="text-align:center;font-weight:bold;">${rival.name}</p>
    <p style="text-align:center;font-size:13px;">
      ${won ? '相手を圧倒した!' : '惜しくも力及ばず...'}
    </p>
    <div style="background:#fff8e0;border:2px solid var(--c-text);border-radius:10px;padding:10px;margin-top:10px;">
      <div style="font-size:12px;font-weight:bold;color:var(--c-pink-deep);margin-bottom:6px;text-align:center;">📊 結果</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:13px;">
        ${Object.entries(gains).map(([k, v]) => {
          const label = k === 'money' ? '🪙 所持金' :
                        k === 'hp' ? '❤️ 最大体力' :
                        ({atk:'⚔️ 攻撃',def:'🛡️ 防御',spd:'💨 素早さ',int:'📚 賢さ',luk:'🍀 運'}[k] || k);
          const suffix = k === 'money' ? 'G' : '';
          return `<div style="background:white;border-radius:6px;padding:4px 8px;display:flex;justify-content:space-between;">
            <span>${label}</span><span style="color:var(--c-pink-deep);font-weight:bold;">+${v}${suffix}</span>
          </div>`;
        }).join('')}
        <div style="background:white;border-radius:6px;padding:4px 8px;display:flex;justify-content:space-between;">
          <span>⚡ スタミナ</span><span style="color:var(--c-red);font-weight:bold;">-${staminaCost}</span>
        </div>

  `;

/* =========================================
   お仕事
   ========================================= */

function doWork() {
  if (game.week > game.maxWeek) return;
  const cmd = COMMANDS.work;
  const seasonStaminaPenalty = currentSeason().staminaPenalty || 1.0;
  const actualStamina = Math.ceil(cmd.stamina * seasonStaminaPenalty);
  if (game.stamina < actualStamina) {
    showToast('スタミナが足りません!');
    return;
  }

  game.stamina -= actualStamina;
  game.trainCount.work = (game.trainCount.work || 0) + 1;

  const s = game.stats;
  const totalScore = Math.floor(s.hp / 2) + s.atk + s.def + s.spd + s.int + s.luk;

  // 収入は totalScore に対し平方根で逓減(序盤の伸びは速く、終盤は緩やかに)
  //   初期 totalScore≈100 → 約 80G、中盤 totalScore≈300 → 約 140G、
  //   終盤 totalScore≈600 → 約 200G、超終盤 totalScore≈1000 → 約 260G
  const variance = 0.8 + game.rng() * 0.4;
  const seasonWorkMult = currentSeason().workMult || 1.0;
  let money = Math.floor((30 + 5 * Math.sqrt(totalScore)) * variance * seasonWorkMult);

  let bonusMsg = '';
  const critChance = 0.05 + Math.min(0.2, s.luk / 200);
  if (game.rng() < critChance) {
    const mul = 1.5 + game.rng() * 0.5;
    money = Math.floor(money * mul);
    bonusMsg = '大成功!';
  }

  game.money += money;

  const gains = { money };
  const g = game.analysis.growthRates;
  const growStat = ['atk', 'def', 'spd', 'int'][Math.floor(game.rng() * 4)];
  const growVal = Math.max(0, Math.round((1 + game.rng()) * g[growStat]));
  if (growVal > 0) {
    game.stats[growStat] += growVal;
    gains[growStat] = growVal;
  }

  const parts = [];
  if (bonusMsg) parts.push(bonusMsg);
  parts.push(`所持金+${money}`);
  STAT_KEYS.forEach(k => {
    if (gains[k] && k !== 'hp') parts.push(`${STAT_NAMES[k]}+${gains[k]}`);
  });
  addLog(`【💼お仕事】 ${parts.join(' / ')}`, 'gain');

  if (game.rng() < 0.20) {
    triggerRandomEvent();
  } else {
    nextWeek();
  }
}

let pendingEvent = null;
let pendingEventWeeks = 1;

function triggerRandomEvent(weeks = 1) {
  pendingEvent = EVENTS[Math.floor(game.rng() * EVENTS.length)];
  pendingEventWeeks = weeks;
  showEventModal();
}

function showEventModal() {
  const ev = pendingEvent;
  if (!ev) return;
  const html = `
    <div class="modal-title">${ev.title}</div>
    <p style="text-align:center;">${ev.text}</p>
    <div class="choice-list">
      ${ev.choices.map((c, i) => `<button class="btn btn-wide primary" onclick="selectEventChoice(${i})">${c.label}</button>`).join('')}
    </div>
  `;
  openModal(html, { dismissable: false });
}

function selectEventChoice(i) {
  const ev = pendingEvent;
  if (!ev) return;

  // 効果適用前のスナップショット
  const before = {
    atk: game.stats.atk, def: game.stats.def, spd: game.stats.spd,
    int: game.stats.int, luk: game.stats.luk,
    maxHp: game.maxHp, money: game.money,
    stamina: game.stamina, maxStamina: game.maxStamina
  };

  // 効果適用
  const result = ev.choices[i].effect();

  // 差分計算
  const diffs = [];
  if (game.stats.atk !== before.atk) diffs.push({ label: '⚔️ 攻撃', val: game.stats.atk - before.atk });
  if (game.stats.def !== before.def) diffs.push({ label: '🛡️ 防御', val: game.stats.def - before.def });
  if (game.stats.spd !== before.spd) diffs.push({ label: '💨 素早さ', val: game.stats.spd - before.spd });
  if (game.stats.int !== before.int) diffs.push({ label: '📚 賢さ', val: game.stats.int - before.int });
  if (game.stats.luk !== before.luk) diffs.push({ label: '🍀 運', val: game.stats.luk - before.luk });
  if (game.maxHp !== before.maxHp) diffs.push({ label: '❤️ 最大体力', val: game.maxHp - before.maxHp });
  if (game.money !== before.money) diffs.push({ label: '🪙 所持金', val: game.money - before.money, suffix: 'G' });
  if (game.stamina !== before.stamina) diffs.push({ label: '⚡ スタミナ', val: game.stamina - before.stamina });
  if (game.maxStamina !== before.maxStamina) diffs.push({ label: '⚡ 最大スタミナ', val: game.maxStamina - before.maxStamina });

  addLog(`【イベント】${ev.title.replace(/^[^\s]+\s/, '')}: ${result}`, 'event');
  pendingEvent = null;
  const weeks = pendingEventWeeks;
  pendingEventWeeks = 1;

  // 結果ウィンドウ表示(モーダルは閉じずに内容を上書き)
  showEventResult(ev, result, diffs, () => nextWeek(weeks));
}

function showEventResult(ev, resultText, diffs, onClose) {
  const hasChange = diffs.length > 0;
  const diffsHtml = hasChange ? `
    <div style="background:#fff8e0;border:2px solid var(--c-text);border-radius:10px;padding:10px;margin-top:10px;">
      <div style="font-size:12px;font-weight:bold;color:var(--c-pink-deep);margin-bottom:6px;text-align:center;">📊 ステータス変化</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:13px;">
        ${diffs.map(d => {
          const isPos = d.val > 0;
          const color = isPos ? 'var(--c-pink-deep)' : 'var(--c-red)';
          const sign = isPos ? '+' : '';
          return `<div style="background:white;border-radius:6px;padding:4px 8px;display:flex;justify-content:space-between;align-items:center;">
            <span>${d.label}</span>
            <span style="color:${color};font-weight:bold;">${sign}${d.val}${d.suffix||''}</span>

      </div>
    </div>
  ` : `

  const modal = document.getElementById('modal');
  modal.setAttribute('data-non-dismissable', 'true');
  modal.classList.add('show');
  // クローズ時のコールバックを保持
  game._eventResultClose = onClose;
}

function closeEventResult() {
  closeModal(true); // 非dismissableを強制的に閉じる
  const cb = game._eventResultClose;
  game._eventResultClose = null;
  if (cb) cb();
}

/* =========================================
   週進行
   ========================================= */

function nextWeek(weeks = 1) {
  const prevMonth = Math.ceil(game.week / 4);

  for (let i = 0; i < weeks; i++) {
    game.week++;
    // 自然回復(スタミナを毎週少し回復)
    game.stamina = Math.min(game.maxStamina, game.stamina + 10);

    if (game.week > game.maxWeek) {
      // 育成期間終了 → ボス戦へ
      startBossBattle();
      return;
    }

    // 月初通知 (週が新しい月の1週目になった瞬間)
    const newMonth = Math.ceil(game.week / 4);
    if (newMonth !== prevMonth + i && ((game.week - 1) % 4 === 0)) {
      // 既に他で出るので何もしない
    }
    if (game.week > 1 && (game.week - 1) % 4 === 0) {
      const month = (game.week - 1) / 4;
      // 月末ボーナス
      addLog(`【${month}ヶ月目終了】 仲間からのご褒美 +50G`, 'event');
      game.money += 50;
      // 新月のテーマ告知
      if (game.week <= game.maxWeek) {
        const s = currentSeason();
        addLog(`【${month + 1}ヶ月目開幕: ${s.icon} ${s.name}】 ${s.desc}`, 'event');
      }
      // 腕試し: 2ヶ月目末(week=9)と4ヶ月目末(week=17)に挑戦解放
      if (month === 2 && !game.trialCleared[0]) {
        if (game.state === 'play') autoSave();
        promptTrial(0);
        return; // モーダル表示するので render はそこで
      }
      if (month === 4 && !game.trialCleared[1]) {
        if (game.state === 'play') autoSave();
        promptTrial(1);
        return;
      }
    }
  }

  if (game.state === 'play') autoSave();
  render();
}

/* ステに倍率を適用するヘルパー。最小+1の上昇を保証(端数切り捨てで0になるのを防ぐ) */
function applyStatMul(key, mul) {
  const before = game.stats[key] || 0;
  let after = Math.floor(before * mul);
  if (after <= before) after = before + 1;
  game.stats[key] = after;
}

/* 最大体力に倍率を適用。currentHpも同比率で増加(現HP割合維持) */
function applyMaxHpMul(mul) {
  const before = game.maxHp || 0;
  let after = Math.floor(before * mul);
  if (after <= before) after = before + 1;
  const gained = after - before;
  game.maxHp = after;
  game.currentHp += gained;
  if (game.stats.hp != null) game.stats.hp = game.maxHp;
}

function buyItem(id) {
  const item = SHOP_ITEMS.find(i => i.id === id);
  if (!item || game.money < item.price) return;
  const month = Math.ceil(game.week / 4);
  if (item.unlockMonth > month) {
    showToast('まだ買えません!');
    return;
  }
  if (item.oneTime) {
    if (!Array.isArray(game.purchasedItems)) game.purchasedItems = [];
    if (game.purchasedItems.includes(item.id)) {
      showToast('この装備は既に購入済です');
      return;
    }
  }
  game.money -= item.price;
  item.effect();
  if (item.oneTime) game.purchasedItems.push(item.id);
  addLog(`【購入】${item.icon}${item.name}を買った! ${item.desc}`, 'gain');
  closeModal();
  render();
}
